  const bd=document.getElementById('card-detail-backdrop');
  const panel=document.getElementById('cd-panel');
  bd.classList.add('show');
  bd.scrollTop=0; panel.scrollTop=0;

  let found=null, isArchive=false;
  for(const d of state.decks){ for(const c of (d.cards||[])){ if(c.name.replace(/\s*\(SB\)\s*$/,'').trim().toLowerCase()===name.toLowerCase()){ found=c; break; } } if(found)break; }
  if(!found) for(const c of (state.archive||[])){ if((c.name||'').toLowerCase()===name.toLowerCase()){ found=c; isArchive=true; break; } }
  const img = (found ? cardImg(found,'normal',game||'mtg') : '') || (seed&&seed.image) || '';
  _cd={ name, game:game||'mtg', foil:!!foil, found, isArchive, detail:null, selIdx:-1, histByIdx:{}, seed:seed||null };
  // Loading state
  panel.innerHTML=`<button class="cd-close" onclick="closeCardDetail()">✕</button>
    <div class="cd-head2"><div class="cd-imgwrap ${foil?'foil-fx':''}"><img src="${img}" onerror="this.style.opacity=0.2"></div>
    <div class="cd-info2"><div class="cd-name2">${esc(name)}</div><div class="cd-setline">Loading market data…</div>
    <div class="sparkline-empty" style="text-align:left;padding:14px 0">Fetching every printing &amp; price history…</div></div></div>`;

  const detail = await fetchCardDetail(name, game, seed);
  if(!cardDetailOpen) return; // closed while loading
  _cd.detail=detail;
  // Pick default printing: the one the owned card points to, else Normal, else first
  if(detail && detail.matched && detail.printings && detail.printings.length){
    const fSet=(found&&found.set||'').toLowerCase(), fCn=normCnJs(found&&found.cn), fFoil=!!(found&&found.foil);
    let idx=detail.printings.findIndex(p=>(p.setCode||p.set||'').toLowerCase()===fSet && normCnJs(p.number)===fCn && (p.printing==='Foil')===fFoil && fCn);
    if(idx<0 && seed && seed.cn) idx=detail.printings.findIndex(p=>normCnJs(p.number)===normCnJs(seed.cn) && (p.setCode||'').toLowerCase()===(seed.set||'').toLowerCase());
    if(idx<0) idx=detail.printings.findIndex(p=>p.printing==='Normal');
    if(idx<0) idx=0;
    _cd.selIdx=idx;
    // The top-level history belongs to primaryId's printing — attach it there, not to
    // whatever is selected, so alt/foil/etc. don't inherit the base printing's chart.
    if(Array.isArray(detail.history) && detail.history.length){
      let hi = detail.primaryId ? detail.printings.findIndex(p=>p.id===detail.primaryId) : -1;
      if(hi<0) hi = detail.printings.findIndex(p=>p.printing==='Normal');
      if(hi<0) hi = 0;
      _cd.histByIdx[hi]=detail.history;
    }
  }
  renderCardDetail();
  // If the selected printing's own history isn't loaded yet, fetch it now.
  if(_cd.detail && _cd.detail.matched && _cd.selIdx>=0 && _cd.histByIdx[_cd.selIdx]===undefined){
    cdSelectPrinting(_cd.selIdx);
  }
}

function _ownedIdx(){
  if(!_cd||!_cd.found||!_cd.detail||!_cd.detail.printings) return -1;
  const f=_cd.found, fSet=(f.set||'').toLowerCase(), fCn=normCnJs(f.cn), fFoil=!!f.foil;
  if(!fCn) return -1;
  return _cd.detail.printings.findIndex(p=>(p.setCode||p.set||'').toLowerCase()===fSet && normCnJs(p.number)===fCn && (p.printing==='Foil')===fFoil);
}

function renderCardDetail(){
  const panel=document.getElementById('cd-panel');
  const {name, game, detail, found}=_cd;
  if(!detail || !detail.matched || !(detail.printings||[]).length){
    const sub = found ? `${(found.set||'').toUpperCase()}${found.cn?' #'+found.cn:''}${found.foil?' · ✨ Foil':''}` : (game==='riftbound'?'Riftbound':'Magic');
    const img = found ? cardImg(found,'normal',game) : '';
    panel.innerHTML=`<button class="cd-close" onclick="closeCardDetail()">✕</button>
      <div class="cd-head2"><div class="cd-imgwrap ${found&&found.foil?'foil-fx':''}"><img src="${img}" onerror="this.style.opacity=0.2"></div>
      <div class="cd-info2"><div class="cd-name2">${esc(name)}</div><div class="cd-setline">${esc(sub)}</div>
      ${found&&(found.price||found.market)?`<div class="cd-bigprice"><span class="amt">${fmt$(found.price||found.market)}</span></div>`:''}
      </div></div>
      <div class="cd-chart2"><div class="sparkline-empty" style="text-align:left">No extended market data found for this card yet. ${game==='riftbound'?'It may be a brand-new printing not in the pricing database — set a Custom Image URL on the card, or run 💰 Prices.':'Try 💰 Prices to fetch from Scryfall.'}</div></div>`;
    return;
  }
  const prints=detail.printings;
  let sel=_cd.selIdx>=0?_cd.selIdx:0; if(sel>=prints.length) sel=0;
  const p=prints[sel];
  const ownedIdx=_ownedIdx();
  const hist=_cd.histByIdx[sel];
  const heroImg=cdPrintImg(p,'normal');
  const isFoil=p.printing==='Foil';
  const pcls=_printClass(p.printing);

  // Hero badges
  let badges='';
  if(p.rarity) badges+=`<span class="cd-badge rarity">${esc(p.rarity)}</span>`;
  badges+=`<span class="cd-badge printing ${pcls}">${esc(p.printing||'Normal')}</span>`;
  if(game==='riftbound') badges+=`<span class="cd-badge">Riftbound</span>`; else badges+=`<span class="cd-badge">Magic</span>`;

  const chgD=p.change7d||0, chgP=p.change7dPct||0;
  const pill = (chgD||chgP) ? `<span class="cd-pill ${_pctCls(chgD)}">${_arrow(chgD)} ${fmt$(Math.abs(chgD))} · ${fmtPct(chgP)}</span>` : '';

  let meta='';
  if(p.low>0) meta+=`<div class="cd-metabox"><div class="l">Low</div><div class="v">${fmt$(p.low)}</div></div>`;
  meta+=`<div class="cd-metabox"><div class="l">7-Day $</div><div class="v ${_pctCls(chgD)}">${chgD>=0?'+':'−'}${fmt$(Math.abs(chgD))}</div></div>`;
  meta+=`<div class="cd-metabox"><div class="l">7-Day %</div><div class="v ${_pctCls(chgP)}">${fmtPct(chgP)}</div></div>`;
  meta+=`<div class="cd-metabox"><div class="l">Printings</div><div class="v">${prints.length}</div></div>`;

  const tcgId=tcgIdFromImg(p.image);
  const canOwn=!!_cd.found;
  let actions='';
  if(tcgId) actions+=`<a class="cd-link" href="https://www.tcgplayer.com/product/${tcgId}" target="_blank" rel="noopener">View on TCGplayer ↗</a>`;
  if(canOwn && ownedIdx!==sel) actions+=`<span class="cd-link" style="cursor:pointer;color:var(--green)" onclick="cdSetOwnedPrinting(${sel})">★ Set as my printing</span>`;
  if(!canOwn) actions+=`<span class="cd-link" style="opacity:.7">Not in your collection</span>`;

  const setLine=`${esc(p.set||(game==='riftbound'?'Riftbound':'Magic'))}${p.number?' · #'+esc(p.number):''}`;

  // chart
  let chartInner;
  if(hist===undefined) chartInner=`<div class="sparkline-empty" style="text-align:left">Loading price history…</div>`;
  else chartInner=priceChart(hist);

  // printings grid
  let grid='';
  prints.forEach((pr,i)=>{
    const thumb=cdPrintImg(pr,'small');
    const c2=_printClass(pr.printing);
    const pc=pr.change7dPct||0;
    grid+=`<div class="cd-print ${i===sel?'active':''}" onclick="cdSelectPrinting(${i})">
      ${i===ownedIdx?'<span class="own-badge">★ Owned</span>':''}
      <img class="thumb" loading="lazy" src="${thumb}" onerror="this.style.opacity=0.25">
      <div class="pbody">
        <div class="pset"><span>${esc(pr.set||'')}</span><span class="num">${pr.number?'#'+esc(pr.number):''}</span></div>
        <div class="ptags"><span class="pt ${c2}">${esc(pr.printing||'Normal')}</span>${pr.rarity?`<span class="pt">${esc(pr.rarity)}</span>`:''}</div>
        <div class="pricerow"><span class="pp">${pr.price>0?fmt$(pr.price):'—'}</span>${(pr.change7dPct)?`<span class="pchg ${_pctCls(pc)}">${fmtPct(pc)}</span>`:''}</div>
        ${i===ownedIdx?`<div class="setbtn owned">✓ Your printing</div>`:(canOwn?`<button class="setbtn" onclick="event.stopPropagation();cdSetOwnedPrinting(${i})">Set as mine</button>`:'')}
      </div>
    </div>`;
  });

  panel.innerHTML=`<button class="cd-close" onclick="closeCardDetail()">✕</button>
    <div class="cd-head2">
      <div class="cd-imgwrap ${isFoil?'foil-fx':''}"><img src="${heroImg}" onerror="this.style.opacity=0.2"></div>
      <div class="cd-info2">
        <div class="cd-badges">${badges}</div>
        <div class="cd-name2">${esc(name)}</div>
        <div class="cd-setline">${setLine}</div>
        <div class="cd-bigprice"><span class="amt">${p.price>0?fmt$(p.price):'—'}</span>${pill}</div>
        <div class="cd-metarow">${meta}</div>
        ${actions?`<div class="cd-actions">${actions}</div>`:''}
      </div>
    </div>
    <div class="cd-section-title">30-Day Price History${p.printing?` · ${esc(p.printing)} ${p.number?'#'+esc(p.number):''}`:''}</div>
    <div class="cd-chart2">${chartInner}</div>
    <div class="cd-section-title">All Printings (${prints.length}) · tap to compare</div>
    <div class="cd-prints">${grid}</div>`;

  // wire interactive chart
  const wrapEl=panel.querySelector('.rc-wrap');
  if(wrapEl) wirePriceChart(wrapEl.id);
}

async function cdSelectPrinting(idx){
  if(!_cd||!_cd.detail) return;
  _cd.selIdx=idx;
  const p=_cd.detail.printings[idx];
  // fetch history for this printing if not cached
  if(_cd.histByIdx[idx]===undefined && p && p.id && !PRICE_PROXY.includes('CHANGEME')){
    renderCardDetail(); // show "loading history"
    try{
      const resp=await fetch(PRICE_PROXY+'/history?id='+encodeURIComponent(p.id)+'&game='+(_cd.game||'mtg'));
      if(resp.ok){ const h=await resp.json(); const pts=(h&&(h.data||h.history||h.points||h.price_history))||[];
        _cd.histByIdx[idx]=histRowsToPoints(pts, p.printing); }
      else _cd.histByIdx[idx]=[];
    }catch(e){ _cd.histByIdx[idx]=[]; }
  } else if(_cd.histByIdx[idx]===undefined){ _cd.histByIdx[idx]=[]; }
  if(cardDetailOpen) renderCardDetail();
}

function cdSetOwnedPrinting(idx){
  if(!_cd||!_cd.found||!_cd.detail) return;
  const p=_cd.detail.printings[idx]; if(!p) return;
  const c=_cd.found;
  if(_cd.game==='riftbound'){ c.set=(p.setCode||p.set||'').toLowerCase(); c.cn=cdImgCn(p); }
  else { c.set=(p.setCode||p.set||'').toLowerCase(); c.cn=p.number||c.cn; }
  c.foil=(p.printing==='Foil');
  if(p.price>0){ if(_cd.isArchive) c.market=p.price; else c.price=p.price; }
  if(p.change7d!==undefined) c.change7d=p.change7d;
  if(p.change7dPct!==undefined) c.change7dPct=p.change7dPct;
  _cd.selIdx=idx;
  save(); render();
  // re-open backdrop (render() may have rebuilt main but popup is separate)
  document.getElementById('card-detail-backdrop').classList.add('show');
  renderCardDetail();
}

function closeCardDetail(){
  cardDetailOpen=false; _cd=null;
  document.getElementById('card-detail-backdrop').classList.remove('show');
}

// ═══════════ OVERHAUL: REFRESH ALL PRICES (bulk) ═══════════
async function refreshAllPrices(){
  if(PRICE_PROXY.includes('CHANGEME')){ alert('Price proxy not set up.'); return; }
  let totalUpdated=0;
  // 1) MTG decks via Scryfall (existing per-deck logic, reused)
  const origView=state.view;
  for(let i=0;i<state.decks.length;i++){
    state.view={type:'deck',deckIndex:i};
    await refreshPrices(true); // silent mode
  }
  state.view=origView;
  recordValueSnapshot();
  save(); render();
  stampPriceUpdate();
  alert('All prices refreshed across every deck.');
}

// ═══════════ HOVER PREVIEW ═══════════
const preview=document.getElementById('card-preview'), previewImg=document.getElementById('card-preview-img');
let previewTimeout; const imgCache={};
function positionPreview(e){
  const pw=265,ph=370; let x=e.clientX+18,y=e.clientY-ph/2;
  if(x+pw>window.innerWidth)x=e.clientX-pw-18;
  if(y<8)y=8; if(y+ph>window.innerHeight-8)y=window.innerHeight-ph-8;
  preview.style.left=x+'px'; preview.style.top=y+'px';
}
document.addEventListener('mouseover',e=>{
  const el=e.target.closest('[data-set]');
  if(el&&el.dataset.set&&el.dataset.cn){
    clearTimeout(previewTimeout);
    previewTimeout=setTimeout(()=>{
      const url=cardImg({set:el.dataset.set,cn:el.dataset.cn,imgUrl:el.dataset.img},'normal',el.dataset.game||'mtg');
      if(!url)return;
      if(!imgCache[url]){const im=new Image();im.src=url;imgCache[url]=im;}
      previewImg.src=url;
      preview.classList.toggle('foil-fx', el.dataset.foil==='1');
      positionPreview(e); preview.classList.add('visible');
    },180);
  }
});
document.addEventListener('mousemove',e=>{ if(preview.classList.contains('visible')&&!mobPreviewActive)positionPreview(e); });
document.addEventListener('mouseout',e=>{ if(e.target.closest&&e.target.closest('[data-set]')){clearTimeout(previewTimeout);if(!mobPreviewActive)preview.classList.remove('visible');} });

// ── Mobile tap-to-preview ──
let mobPreviewActive=false, mobPreviewShownAt=0;
const mobBackdrop=document.getElementById('mob-preview-backdrop');
function mobilePreview(e, set, cn, game, foil, imgUrl){
  if(!isMobile()) return; // desktop name click does nothing extra (hover handles preview)
  e.stopPropagation();
  const url=cardImg({set,cn,imgUrl},'normal',game);
  if(!url) return; // no set code yet — nothing to show
  previewImg.src=url;
  preview.classList.toggle('foil-fx', !!foil);
  // Center it
  const pw=Math.min(280, window.innerWidth-40);
  previewImg.style.width=pw+'px';
  preview.style.left=((window.innerWidth-pw)/2)+'px';
  preview.style.top=Math.max(20,(window.innerHeight-pw*1.4)/2)+'px';
  preview.classList.add('visible');
  mobBackdrop.classList.add('show');
  mobPreviewActive=true; mobPreviewShownAt=Date.now();
}
function hideMobPreview(){
  if(!mobPreviewActive) return;
  if(Date.now()-mobPreviewShownAt<250) return; // ignore the opening tap
  mobPreviewActive=false;
  preview.classList.remove('visible');
  mobBackdrop.classList.remove('show');
  previewImg.style.width='';
}
document.addEventListener('touchstart',()=>{clearTimeout(previewTimeout);hideMobPreview();},{passive:true});
document.addEventListener('scroll',()=>{hideMobPreview();},{passive:true,capture:true});
mobBackdrop.addEventListener('click',hideMobPreview);

// ═══════════ LOCK ═══════════
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
const EXPECTED_HASH='3be7a505483c0050243c5cbad4700da13925aa4137a55e9e33efd8bc4d05850f';
async function tryUnlock(){
  const v=document.getElementById('lock-input').value;
  if(await sha256(v)===EXPECTED_HASH){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('layout').style.display='flex';
    sessionStorage.setItem('vault-unlocked','1'); render();
  } else { document.getElementById('lock-error').textContent='Wrong password';
    document.getElementById('lock-input').value=''; document.getElementById('lock-input').focus(); }
}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('vault-unlocked')==='1'){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('layout').style.display='flex'; render();
  }
  document.getElementById('lock-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
});

// Block pinch zoom on touch devices only (double-tap is handled by touch-action: manipulation in CSS)
if (window.matchMedia('(pointer: coarse)').matches) {
  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('gesturechange', e=>e.preventDefault());
}

loadLocal();
initFirebase();
let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(render,200);});

// Service worker
if('serviceWorker' in navigator){
  const sw=`const C='kenns-vault-v43';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl)).catch(()=>{});return r;}).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
