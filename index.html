<style>
:root {
  --bg: #05070b;
  --glass: rgba(255,255,255,0.035);
  --glass-2: rgba(255,255,255,0.055);
  --glass-hi: rgba(255,255,255,0.09);
  --stroke: rgba(255,255,255,0.07);
  --stroke-hi: rgba(255,255,255,0.14);
  --text: #cdd5dd;
  --text-dim: #7d8893;
  --text-bright: #f0f4f8;
  --green: #34d399; --green-deep: #0d9466; --green-bg: rgba(20,83,55,0.28);
  --gold: #e8c468; --gold-dim: #b69247;
  --red: #f87171; --orange: #fbab60; --blue: #7cc4ff; --purple: #c4a5ff;
  --sidebar-w: 248px;
  --radius: 16px;
}
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
html { height:100%; overflow-x:hidden; }
body {
  font-family:'Space Grotesk',sans-serif; color:var(--text); min-height:100%;
  background: var(--bg);
  -webkit-text-size-adjust:100%; overflow-x:hidden; width:100%;
}
/* Ambient gradient layer — fixed pseudo-element instead of background-attachment:fixed (which breaks wheel scrolling with backdrop-filter) */
body::before {
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 15% -5%, rgba(16,148,102,0.10), transparent),
    radial-gradient(ellipse 55% 40% at 95% 8%, rgba(99,82,255,0.07), transparent),
    radial-gradient(ellipse 60% 50% at 70% 110%, rgba(232,196,104,0.05), transparent);
}
.mono { font-family:'JetBrains Mono',monospace; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
input, select, textarea, button { font-family:inherit; color:var(--text); }
input, select, textarea {
  background: rgba(0,0,0,0.35); border:1px solid var(--stroke); border-radius:10px;
  padding:10px 14px; font-size:16px; outline:none; transition:border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--green-deep); }

/* ── Glass panel ── */
.glass {
  background: var(--glass);
  backdrop-filter: blur(22px) saturate(1.3);
  -webkit-backdrop-filter: blur(22px) saturate(1.3);
  border: 1px solid var(--stroke);
  border-radius: var(--radius);
}

/* ── Layout ── */
#layout { display:flex; min-height:100vh; }
#sidebar {
  width: var(--sidebar-w); flex-shrink:0; position:fixed; top:0; left:0; bottom:0; z-index:50;
  background: rgba(8,11,16,0.72);
  backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border-right: 1px solid var(--stroke);
  display:flex; flex-direction:column;
  padding: calc(18px + env(safe-area-inset-top, 0px)) 12px calc(14px + env(safe-area-inset-bottom, 0px));
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
#sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
#main { flex:1; margin-left: var(--sidebar-w);
  padding: calc(22px + env(safe-area-inset-top, 0px)) 26px calc(80px + env(safe-area-inset-bottom, 0px));
  max-width: 1060px; transition: margin-left .28s cubic-bezier(.4,0,.2,1); min-width:0; }
#main.full { margin-left: 0; }

.brand { display:flex; align-items:center; gap:10px; padding:4px 10px 16px; }
.brand .lock { font-size:20px; filter: drop-shadow(0 0 12px rgba(232,196,104,0.35)); }
.brand h1 { font-size:16px; font-weight:700; color:var(--text-bright); letter-spacing:-0.3px; font-family:'JetBrains Mono',monospace; }
.brand .sub { font-size:9px; color:var(--gold-dim); letter-spacing:2.5px; text-transform:uppercase; }

.nav-section { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-dim); padding:14px 12px 6px; font-weight:600; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:11px; cursor:pointer;
  font-size:13px; font-weight:500; color:var(--text-dim); transition: all .18s; border:1px solid transparent;
  margin-bottom:2px; user-select:none;
}
.nav-item:hover { color:var(--text-bright); background:var(--glass); }
.nav-item.active {
  color:var(--green); background: linear-gradient(135deg, rgba(20,148,102,0.13), rgba(20,148,102,0.04));
  border-color: rgba(52,211,153,0.22);
  box-shadow: 0 0 18px rgba(16,148,102,0.10) inset;
}
.nav-item .ico { width:18px; text-align:center; font-size:14px; }
.nav-item .cnt { margin-left:auto; font-size:10px; font-family:'JetBrains Mono',monospace; opacity:.7; }
.nav-item.small { font-size:12px; padding:7px 12px; }
.sidebar-footer { margin-top:auto; padding-top:14px; border-top:1px solid var(--stroke); display:flex; flex-direction:column; gap:6px; }
#sync-badge { font-size:10px; color:var(--text-dim); text-align:center; padding:4px; font-family:'JetBrains Mono',monospace; }

/* ── Buttons ── */
.btn {
  padding:8px 16px; border-radius:11px; border:1px solid var(--stroke); background:var(--glass);
  font-size:12px; cursor:pointer; font-weight:500; transition:all .2s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn:hover { border-color:var(--stroke-hi); background:var(--glass-2); color:var(--text-bright); }
.btn-green { background: linear-gradient(135deg, rgba(13,148,102,0.85), rgba(9,110,76,0.85)); border-color:rgba(52,211,153,0.4); color:#fff; }
.btn-green:hover { background: linear-gradient(135deg, rgba(16,180,124,0.9), rgba(13,148,102,0.9)); }
.btn-red { border-color: rgba(248,113,113,0.35); color:var(--red); }
.btn-red:hover { background: rgba(248,113,113,0.08); }
.btn-sm { padding:5px 11px; font-size:11px; }
.btn-block { width:100%; text-align:center; }

/* ── Topbar ── */
.topbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
#menu-toggle { display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:11px; cursor:pointer; font-size:16px; border:1px solid var(--stroke); background:var(--glass); flex-shrink:0; backdrop-filter:blur(10px); }
.topbar h2 { font-size:19px; color:var(--text-bright); font-weight:700; letter-spacing:-0.4px; }
.topbar .spacer { flex:1; }

/* ── Deck hero ── */
.deck-hero { padding:20px 22px; margin-bottom:16px; position:relative; overflow:hidden; }
.deck-hero::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg, rgba(16,148,102,0.07), transparent 50%); pointer-events:none; }
.deck-hero .row1 { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px; }
.deck-title { font-size:19px; color:var(--text-bright); font-weight:700; font-family:'JetBrains Mono',monospace; display:flex; align-items:center; gap:8px; }
.deck-sub { font-size:12px; color:var(--text-dim); margin-top:3px; }
.gc-badge { padding:5px 13px; border-radius:20px; font-size:11px; font-weight:600; backdrop-filter:blur(8px); }
.gc-badge.safe { background:rgba(20,148,102,0.12); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
.gc-badge.warn { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.35); color:var(--red); }

.progress-wrap { display:flex; align-items:center; gap:12px; padding:14px 0 12px; }
.progress-bar { flex:1; height:8px; background:rgba(0,0,0,0.4); border-radius:4px; overflow:hidden; border:1px solid var(--stroke); }
.progress-fill { height:100%; border-radius:4px; transition:width .5s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg, var(--green-deep), var(--green)); box-shadow:0 0 12px rgba(52,211,153,0.4); }
.progress-text { font-size:12px; color:var(--green); font-weight:600; white-space:nowrap; }

.stats { display:flex; gap:8px; flex-wrap:wrap; }
.stat { background:rgba(0,0,0,0.28); border:1px solid var(--stroke); border-radius:13px; padding:9px 15px; text-align:center; min-width:76px; backdrop-filter:blur(8px); }
.stat-val { font-size:17px; font-weight:700; }
.stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.2px; margin-top:3px; }
.warn-banner { margin-top:12px; padding:7px 14px; border-radius:10px; font-size:12px; font-weight:600; }

/* ── Strategy ── */
.strategy-toggle { width:100%; display:flex; justify-content:space-between; align-items:center; padding:11px 18px; margin-bottom:14px; cursor:pointer; font-size:13px; font-weight:600; color:var(--green); }
.strategy-panel { padding:18px; margin:-10px 0 16px; }
.strat-section { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; margin:0 0 8px; font-weight:700; }
.strat-item { background:rgba(0,0,0,0.25); border-radius:11px; padding:9px 13px; border:1px solid var(--stroke); margin-bottom:6px; }
.strat-item .title { font-size:12px; font-weight:600; }
.strat-item .desc { font-size:11px; color:var(--text-dim); margin-top:2px; }
.combo-row { display:grid; grid-template-columns:1fr auto 1fr auto 2fr; gap:8px; align-items:center; font-size:11px; }

/* ── Filters ── */
.filters { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.filters input[type=text] { flex:1 1 170px; font-size:14px; padding:9px 14px; }
.filters select { font-size:12px; padding:8px 10px; cursor:pointer; }
.filter-count { font-size:11px; color:var(--text-dim); }

/* ── Table ── */
.table-wrap { border-radius:var(--radius); overflow:hidden; border:1px solid var(--stroke); background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
.table-header { display:grid; background:rgba(0,0,0,0.35); border-bottom:1px solid rgba(52,211,153,0.25); }
.table-header button { background:none; border:none; color:var(--text-dim); padding:11px 6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:color .2s; white-space:nowrap; }
.table-header button.sorted { color:var(--green); }
.table-header button:hover { color:var(--text-bright); }
.sort-icon { margin-left:3px; font-size:8px; }
.table-row { display:grid; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; transition:background .12s; align-items:center; }
.table-row:hover { background:var(--glass-2) !important; }
.table-row.owned { background:var(--green-bg) !important; }
.cb { width:20px; height:20px; border-radius:6px; border:1.5px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; transition:all .15s; margin:0 auto; }
.cb.checked { border-color:var(--green); background:linear-gradient(135deg, var(--green-deep), #0a7350); box-shadow:0 0 8px rgba(52,211,153,0.35); }
.cb.checked::after { content:'✓'; color:#fff; font-size:12px; font-weight:700; }
.cb.partial { border-color:var(--gold); background:linear-gradient(135deg, var(--gold-dim), #8a6d2e); box-shadow:0 0 8px rgba(232,196,104,0.3); }
.table-row.partial { }
.section-header { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; background:rgba(0,0,0,0.35); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--stroke); position:sticky; top:0; z-index:5; backdrop-filter:blur(8px); }
.type-badge { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; white-space:nowrap; display:inline-block; }
.price { font-size:12px; color:var(--gold); }
.no-preview { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--orange); opacity:.65; margin-left:5px; vertical-align:middle; }

/* ── Card hover preview ── */
#card-preview { position:fixed; z-index:300; pointer-events:none; display:none; filter:drop-shadow(0 16px 40px rgba(0,0,0,.7)); opacity:0; transition:opacity .15s; }
#card-preview.visible { display:block; opacity:1; }
#card-preview img { width:255px; border-radius:13px; display:block; }

/* ── Foil holo shimmer ── */
.foil-fx { position:relative; }
.foil-fx::after {
  content:''; position:absolute; inset:0; border-radius:13px; pointer-events:none;
  background:
    linear-gradient(115deg, rgba(255,60,60,.32) 0%, rgba(255,170,0,.22) 14%, rgba(230,255,40,.20) 28%, rgba(60,255,140,.22) 42%, rgba(40,230,255,.28) 56%, rgba(60,120,255,.30) 70%, rgba(170,60,255,.28) 84%, rgba(255,60,200,.30) 100%);
  mix-blend-mode: screen; opacity:.5;
  animation: foilShift 4s ease-in-out infinite alternate;
}
@keyframes foilShift { from { filter:hue-rotate(0deg); opacity:.42; } to { filter:hue-rotate(40deg); opacity:.58; } }
#card-preview.foil-fx::after { border-radius:13px; }
.trophy-card .foil-fx, .trophy-card .foil-fx img { border-radius:9px; }
.trophy-card .foil-fx::after { border-radius:9px; }

/* Mobile tap preview backdrop */
#mob-preview-backdrop { display:none; position:fixed; inset:0; z-index:290; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
#mob-preview-backdrop.show { display:block; }

/* ── Trophy Room ── */
.trophy-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:16px; }
.trophy-card { padding:12px; text-align:center; transition:transform .2s, box-shadow .2s; position:relative; }
.trophy-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.45); }
.trophy-card img { width:100%; border-radius:9px; display:block; }
.trophy-card .ph { width:100%; aspect-ratio:5/7; border-radius:9px; background:rgba(0,0,0,0.35); border:1px dashed var(--stroke-hi); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; color:var(--text-dim); font-size:11px; padding:10px; }
.trophy-card .tname { font-size:11.5px; color:var(--text-bright); font-weight:600; margin-top:9px; line-height:1.3; }
.trophy-card .tprice { font-size:14px; color:var(--gold); font-weight:700; font-family:'JetBrains Mono',monospace; margin-top:2px; }
.trophy-card .tdeck { font-size:9.5px; color:var(--text-dim); margin-top:2px; }
.trophy-rank { position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); border:1px solid var(--gold-dim); color:var(--gold); font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:10px; z-index:2; }

/* ── Sealed Tracker ── */
.sealed-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:18px; }
.sealed-stat { padding:16px; text-align:center; }
.sealed-stat .v { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.sealed-stat .l { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }
.opening { padding:16px 18px; margin-bottom:12px; }
.opening .head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.opening .pname { font-size:14px; font-weight:700; color:var(--text-bright); }
.opening .pdate { font-size:11px; color:var(--text-dim); margin-top:2px; }
.pl-badge { padding:4px 12px; border-radius:16px; font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.pl-pos { background:rgba(20,148,102,0.13); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
.pl-neg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:var(--red); }
.pulls { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.pull { text-align:center; width:78px; }
.pull img { width:78px; border-radius:5px; display:block; }
.pull .pn { font-size:8.5px; color:var(--text-dim); margin-top:3px; line-height:1.2; }
.pull .pv { font-size:10px; color:var(--gold); font-weight:600; font-family:'JetBrains Mono',monospace; }

/* ── Modals ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:rgba(14,18,24,0.92); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px); border:1px solid var(--stroke-hi); border-radius:20px; padding:26px 24px; width:92%; max-width:460px; max-height:88vh; overflow-y:auto; overscroll-behavior:contain; }
.modal h3 { font-size:16px; color:var(--text-bright); margin-bottom:16px; }
.modal label { display:block; font-size:11px; color:var(--text-dim); margin:12px 0 5px; text-transform:uppercase; letter-spacing:1px; }
.modal input, .modal select, .modal textarea { width:100%; }
.modal-actions { display:flex; gap:8px; margin-top:22px; justify-content:flex-end; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

#sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; backdrop-filter:blur(3px); }

/* ── Lock Screen ── */
#lock-screen { position:fixed; inset:0; background:var(--bg);
  background-image: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(16,148,102,0.12), transparent), radial-gradient(ellipse 50% 40% at 50% 110%, rgba(232,196,104,0.07), transparent);
  display:flex; align-items:center; justify-content:center; z-index:9999; }
.lock-box { padding:44px 38px; text-align:center; width:90%; max-width:360px; }
.lock-icon { font-size:44px; margin-bottom:14px; filter:drop-shadow(0 0 20px rgba(232,196,104,0.4)); }
#lock-screen h2 { font-size:22px; color:var(--text-bright); margin-bottom:4px; font-family:'JetBrains Mono',monospace; }
.lock-sub { font-size:12px; color:var(--text-dim); margin-bottom:24px; }
#lock-input { width:100%; text-align:center; letter-spacing:3px; }
.lock-btn { width:100%; margin-top:12px; padding:12px; }
.lock-error { color:var(--red); font-size:12px; margin-top:10px; min-height:18px; }

.footer-note { margin-top:18px; padding:11px 16px; font-size:10.5px; color:rgba(125,136,147,0.7); }

/* ── Mobile ── */
@media (max-width: 760px) {
  body { touch-action: manipulation; overscroll-behavior-y: contain; }
  #sidebar { transform:translateX(calc(-1 * var(--sidebar-w))); }
  #sidebar.open { transform:translateX(0); box-shadow:20px 0 60px rgba(0,0,0,0.5); }
  #sidebar-overlay.show { display:block; }
  #main { margin-left:0; padding: calc(12px + env(safe-area-inset-top, 0px)) 10px calc(70px + env(safe-area-inset-bottom, 0px)); }
  .table-row { touch-action:pan-y; }
  .deck-hero { padding:15px; }
  .deck-title { font-size:15px; }
  .stat { min-width:58px; padding:7px 9px; }
  .stat-val { font-size:14px; }
  .combo-row { grid-template-columns:1fr; gap:2px; }
  .modal-overlay { align-items:flex-end; }
  .modal { width:100%; max-width:100%; border-radius:22px 22px 0 0; padding:22px 18px calc(34px + env(safe-area-inset-bottom, 0px)); }
  .trophy-grid { grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px; }
  .filters select { flex:1; min-width:0; }
  .topbar h2 { font-size:16px; }
}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box glass">

function isGameChanger(n){ return GAME_CHANGERS_LIST.some(g=>g.toLowerCase()===n.toLowerCase()); }
function makeCard(name,qty,role,type,owned=false,price=0,set='',cn=''){ return {name,qty,role,type,owned,ownedQty:owned?qty:0,price,gameChanger:isGameChanger(name),notes:'',set,cn,foil:false}; }
// Ownership helpers — a card counts toward owned value by how many copies you have
function cOwnedQty(c){ if(typeof c.ownedQty==='number') return Math.min(c.ownedQty, c.qty||1); return c.owned?(c.qty||1):0; }
function cIsFullyOwned(c){ return cOwnedQty(c) >= (c.qty||1); }
function cIsPartial(c){ const o=cOwnedQty(c); return o>0 && o<(c.qty||1); }

let firebaseConnected=false, saving=false;

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({decks:state.decks, sealed:state.sealed, archive:state.archive})); } catch(e){}
  if (firebaseConnected && !saving) {
    saving = true;
    Promise.all([decksRef.set(state.decks), sealedRef.set(state.sealed), archiveRef.set(state.archive)]).then(()=>{
      saving=false; state.syncStatus='✓ Synced'; updateSync();
    }).catch(err=>{ saving=false; state.syncStatus='⚠ Sync failed'; updateSync(); console.error(err); });
  }
}
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.decks && d.decks.length) { state.decks=d.decks; state.sealed=d.sealed||[]; state.archive=d.archive||state.archive; return true; }
  } catch(e){}
  return false;
}
function updateSync() {
  const el=document.getElementById('sync-badge');
  if(el){ el.textContent=state.syncStatus; el.style.color = state.syncStatus.includes('✓')?'var(--green)':state.syncStatus.includes('⚠')?'var(--orange)':'var(--text-dim)'; }
}
function initFirebase() {
  db.ref('.info/connected').on('value', s=>{
    firebaseConnected = s.val()===true;
    state.syncStatus = firebaseConnected ? '✓ Synced' : '⚡ Offline';
    updateSync();
  });
  // Auto-migrate: if remote data is older format (no version marker), push baked-in data up
  db.ref('dataVersion').once('value').then(snap=>{
    const v = snap.val()||0;
    const finish = ()=>{
      decksRef.on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && d.length>0 && !saving) {
          state.decks=d; try{localStorage.setItem(STORAGE_KEY,JSON.stringify({decks:state.decks,sealed:state.sealed}));}catch(e){}
          state.syncStatus='✓ Synced'; render();
        }
      });
      sealedRef.on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && !saving) { state.sealed=d; render(); }
      });
      archiveRef.on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && !saving) { state.archive=d; render(); }
      });
    };
    if (v < DATA_VERSION) {
      Promise.all([decksRef.set(state.decks), sealedRef.set(state.sealed), archiveRef.set(state.archive), db.ref('dataVersion').set(DATA_VERSION)])
        .then(finish).catch(finish);
    } else finish();
  }).catch(()=>{});
}

function scryUrl(set,cn,size='normal',game='mtg'){

function renderNav() {
  let h='';
  const games=[...new Set(state.decks.map(d=>d.game||'mtg'))];
  for(const g of games){
    const info=GAMES[g]||{label:g,icon:'🎴'};
    h+=`<div class="nav-section">${info.icon} ${info.label}</div>`;
    state.decks.forEach((d,i)=>{
      if((d.game||'mtg')!==g) return;
      const active = state.view.type==='deck' && state.view.deckIndex===i;
      const t=deckTotal(d);
      h+=`<div class="nav-item ${active?'active':''}" onclick="goDeck(${i})"><span class="ico">▸</span>${esc(d.name)}<span class="cnt">${t}</span></div>`;
    });
  }
  h+=`<div class="nav-section">Vault</div>`;
  h+=`<div class="nav-item ${state.view.type==='trophy'?'active':''}" onclick="goView('trophy')"><span class="ico">🏆</span>Trophy Room</div>`;
  h+=`<div class="nav-item ${state.view.type==='archive'?'active':''}" onclick="goView('archive')"><span class="ico">📚</span>The Archive<span class="cnt">${(state.archive||[]).length}</span></div>`;
  h+=`<div class="nav-item ${state.view.type==='sealed'?'active':''}" onclick="goView('sealed')"><span class="ico">📦</span>Sealed Tracker</div>`;
  h+=`<div class="nav-section">Manage</div>`;
  h+=`<div class="nav-item small" onclick="showImportDeck()"><span class="ico">＋</span>Add Deck</div>`;
  navContent.innerHTML=h;
}

function render() {
  renderNav();
  if (state.view.type==='deck') renderDeck();
  else if (state.view.type==='trophy') renderTrophy();
  else if (state.view.type==='archive') renderArchive();

  updateSync();
}

    <div style="text-align:center;font-size:13px;color:var(--text-dim)" class="mono">${q>1?`<span style="color:var(--orange);font-weight:600">×${q}</span>`:q}</div>
    <div style="padding:7px 6px;font-size:11.5px;color:var(--text-dim)">${esc(card.role)}</div>
    <div style="padding:7px 6px">${typeBadge(card.type)}</div>
    <div style="padding:7px;text-align:right" class="price mono">$${card.price>0?card.price.toFixed(2):'—'}</div>
    <div style="text-align:center;display:flex;gap:0;justify-content:center"><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:4px" onclick="editCard(${idx})" title="Edit">✏️</button><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:4px" onclick="removeCard(${idx})" title="Remove">🗑️</button></div>
  </div>`;
}

function buildTableBody(deck, cards, mob, grid) {
  let display=cards.map((c,i)=>({c,idx:i}));
  if(state.filterType!=='All') display=display.filter(o=>o.c.type===state.filterType);
  if(state.filterRole!=='All') display=display.filter(o=>o.c.role===state.filterRole);
  if(state.search){ const q=state.search.toLowerCase(); display=display.filter(o=>o.c.name.toLowerCase().includes(q)); }
  if(state.sort.field){
    display.sort((x,y)=>{ let va=x.c[state.sort.field],vb=y.c[state.sort.field];
      if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();}
      if(typeof va==='boolean'){va=va?1:0;vb=vb?1:0;}
      if(va<vb)return state.sort.dir==='asc'?-1:1; if(va>vb)return state.sort.dir==='asc'?1:-1; return 0; });
  }
  const isRift = (deck.game||'mtg')==='riftbound';
  let h='';
  // Section grouping for Riftbound (only when not actively sorting by a column — sorting flattens)
  if (isRift && !state.sort.field) {
    const groups={};
    for(const o of display){ const r=o.c.role||'Other'; (groups[r]=groups[r]||[]).push(o); }
    const order=[...RB_SECTION_ORDER.filter(s=>groups[s]), ...Object.keys(groups).filter(s=>!RB_SECTION_ORDER.includes(s))];
    let ri=0;
    for(const sec of order){
      const meta=RB_SECTION_META[sec]||{icon:'•',color:'var(--text-dim)'};
      const secCards=groups[sec];
      const secTotal=secCards.reduce((s,o)=>s+(o.c.qty||1),0);
      const secOwned=secCards.reduce((s,o)=>s+cOwnedQty(o.c),0);
      h+=`<div class="section-header" style="border-left:3px solid ${meta.color}"><span style="color:${meta.color}">${meta.icon} ${esc(sec)}</span><span class="mono" style="color:var(--text-dim);font-size:10px">${secOwned}/${secTotal}</span></div>`;
      for(const o of secCards){ h+=rowHtml(deck,o.c,o.idx,mob,grid,ri++); }
    }
  } else {
    let ri=0;
    for(const o of display){ h+=rowHtml(deck,o.c,o.idx,mob,grid,ri++); }
  }
  return {html:h, count:display.length};
}

function renderDeck() {

      <div class="stat"><div class="stat-val mono" style="color:var(--green)">${fmt$(ownedPrice)}</div><div class="stat-label">Owned $</div></div>

        : `<div class="stat"><div class="stat-val mono" style="color:${ownedT>=total&&total>0?'var(--green)':'var(--orange)'}">${ownedT}<span style="font-size:11px;color:var(--text-dim)">/${total}</span></div><div class="stat-label">Owned</div></div>`}

    </div>
    ${isMtg && total!==100 && total>0 ? `<div class="warn-banner" style="background:${total>100?'rgba(248,113,113,.08)':'rgba(251,171,96,.08)'};border:1px solid ${total>100?'var(--red)':'var(--orange)'};color:${total>100?'var(--red)':'var(--orange)'}">⚠️ ${total} cards — ${total>100?(total-100)+' over, need to cut':(100-total)+' under, need to add'}</div>`:''}

    if (state.strategyOpen) h += renderStrategy(deck.strategy);

  h += `<div class="filters">
    <input type="text" id="search-input" placeholder="Search cards…" value="${esc(state.search)}" oninput="setSearch(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <select onchange="state.filterType=this.value==='All Types'?'All':this.value;render()">${types.map(t=>`<option ${t===state.filterType?'selected':''}>${t==='All'?'All Types':t}</option>`).join('')}</select>

function openArchiveModal(i){ state.editingArchive = (i===undefined)?'new':i; render(); }
function deleteArchiveCard(i){
  if(confirm(`Remove "${state.archive[i].name}" from the Archive?`)){ state.archive.splice(i,1); save(); render(); }
}
function saveArchiveCard(){
  const c = {
    name: document.getElementById('ar-name').value.trim(),
    game: document.getElementById('ar-game').value,
    set: (document.getElementById('ar-set').value||'').trim().toLowerCase(),
    cn: (document.getElementById('ar-cn').value||'').trim(),
    qty: parseInt(document.getElementById('ar-qty').value)||1,
    market: parseFloat(document.getElementById('ar-market').value)||0,
    low: parseFloat(document.getElementById('ar-low').value)||0,
    notes: document.getElementById('ar-notes').value,
    foil: document.getElementById('ar-foil').checked
  };
  if(!c.name){alert('Enter a card name.');return;}
  if(state.editingArchive==='new') state.archive.push(c);
  else state.archive[state.editingArchive]=c;
  state.editingArchive=null; save(); render();
}
async function refreshArchivePrices(){
  const mtgCards = state.archive.filter(c=>(c.game||'mtg')==='mtg');
  if(mtgCards.length===0){ alert('No MTG cards in the Archive — Riftbound prices are manual (no free price API exists).'); return; }
  const ids = mtgCards.map(c=> c.set&&c.cn ? {set:c.set,collector_number:''+c.cn} : {name:c.name.split('//')[0].split(' / ')[0].trim()});
  let updated=0;
  for(let i=0;i<ids.length;i+=75){
    try{
      const resp=await fetch('https://api.scryfall.com/cards/collection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifiers:ids.slice(i,i+75)})});
      if(resp.ok){
        const data=await resp.json();
        for(const card of (data.data||[])){
          let m=mtgCards.find(c=>c.set&&c.cn&&(''+c.set).toLowerCase()===(''+card.set).toLowerCase()&&(''+c.cn).toLowerCase()===(''+card.collector_number).toLowerCase());
          if(!m){ const fn=card.name.split('//')[0].trim().toLowerCase();
            m=mtgCards.find(c=>!(c.set&&c.cn)&&c.name.split('//')[0].split(' / ')[0].trim().toLowerCase()===fn); }
          if(!m)continue;
          const price = m.foil
            ? parseFloat(card.prices?.usd_foil || card.prices?.usd_etched || card.prices?.usd || '0')
            : parseFloat(card.prices?.usd || card.prices?.usd_foil || '0');
          if(price>0){ m.market=price; updated++; }
        }
      }
    }catch(e){console.error(e);}
    await new Promise(r=>setTimeout(r,130));
  }
  save(); render();
  alert(`Updated ${updated} market prices (TCGPlayer market via Scryfall). Riftbound cards stay manual.`);
}

function goDeck(i){ state.view={type:'deck',deckIndex:i}; state.sort={field:null,dir:'asc'}; state.filterType='All'; state.filterRole='All'; state.search=''; state.strategyOpen=false; if(isMobile())toggleSidebar(false); render(); }

function toggleSidebar(force){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebar-overlay'), mn=document.getElementById('main');
  if(isMobile()){ const open = force!==undefined?force:!sb.classList.contains('open'); sb.classList.toggle('open',open); ov.classList.toggle('show',open); }
  else { const collapsed = force!==undefined?!force:!sb.classList.contains('collapsed'); sb.classList.toggle('collapsed',collapsed); mn.classList.toggle('full',collapsed); }
}
function toggleSort(f){ if(state.sort.field===f) state.sort.dir=state.sort.dir==='asc'?'desc':'asc'; else state.sort={field:f,dir:'asc'}; render(); }
function setSearch(v){
  state.search=v;

  if (state.view.type==='deck'){
    const deck=state.decks[state.view.deckIndex]; const cards=deck.cards; const mob=isMobile();
    const cols = mob
      ? [{w:'36px'},{w:'1fr'},{w:'34px'},{w:'52px'},{w:'40px'}]
      : [{w:'44px'},{w:'1fr'},{w:'46px'},{w:'128px'},{w:'108px'},{w:'72px'},{w:'58px'}];
    const grid = cols.map(c=>c.w).join(' ');
    const body = buildTableBody(deck, cards, mob, grid);
    const tb=document.getElementById('table-body'); if(tb) tb.innerHTML=body.html;
    const fc=document.getElementById('filter-count'); if(fc) fc.textContent=body.count+' cards';
  }

function toggleOwned(idx){
  const c=state.decks[state.view.deckIndex].cards[idx];
  const q=c.qty||1;
  // single-copy: flip between 0 and full
  c.ownedQty = cIsFullyOwned(c) ? 0 : q;
  c.owned = c.ownedQty>=q;
  persistAndRefreshRows();
}
function cycleOwned(idx, e){
  if(e) e.stopPropagation();
  const c=state.decks[state.view.deckIndex].cards[idx];
  const q=c.qty||1;
  // cycle 0 → q (full) → then steps down? No: tap increments by 1, wraps at q→0. Long-press not needed.
  let oq=cOwnedQty(c);
  oq = oq>=q ? 0 : oq+1;
  c.ownedQty=oq; c.owned=oq>=q;
  persistAndRefreshRows();
}
function persistAndRefreshRows(){
  save();
  // Re-render just the table body + stats area, preserve scroll
  const sc=window.scrollY;
  render();
  requestAnimationFrame(()=>window.scrollTo(0,sc));
}

function deleteDeck(){

  const d=state.decks[state.view.deckIndex];
  if(confirm(`Delete "${d.name}"? This cannot be undone.`)){

  }
}
function showImportDeck(){ state.showImportDeck=true; if(isMobile())toggleSidebar(false); render(); }
function parseDeckList(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//')&&!l.startsWith('#'));
  const cards=[]; 
  for(const line of lines){
    const isFoil = /\*F\*/.test(line);
    let m=line.match(/^(\d+)\s+(.+?)\s+\(([A-Za-z0-9]+)\)\s+(\S+?)(?:\s+\*F\*)?$/);
    let qty,name,set='',cn='';
    if(m){ qty=parseInt(m[1]); name=m[2].trim(); set=m[3].toLowerCase(); cn=m[4]; }
    else { m=line.match(/^(\d+)\s+(.+)$/); if(!m)continue; qty=parseInt(m[1]); name=m[2].replace(/\s*\*F\*\s*$/,'').trim(); }
    const ex=cards.find(c=>c.name.toLowerCase()===name.toLowerCase());
    if(ex){ ex.qty+=qty; continue; }
    const nl=name.toLowerCase();
    const landish=['forest','island','swamp','mountain','plains'].includes(nl)||/(pathway|foundry|retreat|prairie|mesa|canyon|verge|garrison|tower|enclave|stronghold|saga|snarl|parlor|peaks|passage|flagstones|sanctum|coliseum|grove|catacombs|bluffs|cliffs|shores|springs|ruins|reef|ridge|river|bog|mine|quarry|portal|bridge|orchard|hub|settlement|encampment|ring$)/.test(nl);
    const type=landish?'Land':'Creature';
    const nc=makeCard(name,qty,landish?'Land':'Uncategorized',type,false,0,set,cn);
    nc.foil=isFoil;
    cards.push(nc);
  }
  return cards;
}
function importDeckList(){
  const name=document.getElementById('imp-name').value.trim();
  const game=document.getElementById('imp-game').value;
  const cmdr=document.getElementById('imp-cmdr').value.trim();
  const bracket=parseInt(document.getElementById('imp-bracket').value)||3;
  const owned=document.getElementById('imp-owned').value==='true';
  const txt=document.getElementById('imp-list').value;
  if(!name){alert('Enter a deck name.');return;}
  const cards=parseDeckList(txt);
  if(cards.length===0){alert('Could not parse any cards.');return;}
  if(owned)cards.forEach(c=>c.owned=true);
  if(cmdr){const cc=cards.find(c=>c.name.toLowerCase()===cmdr.toLowerCase()); if(cc)cc.role='Commander';}
  state.decks.push({id:'deck-'+Date.now(),name,commander:cmdr||'',colors:[],bracket,game,strategy:null,cards});
  state.view={type:'deck',deckIndex:state.decks.length-1}; state.showImportDeck=false;
  save(); render();
}

// Export / Import / Reset
function exportData(){
  const blob=new Blob([JSON.stringify({version:2,decks:state.decks,sealed:state.sealed,archive:state.archive},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`kenns_vault_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}
function importData(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(Array.isArray(d)&&d.length&&d[0].cards){ state.decks=d; }
      else if(d&&d.decks){ state.decks=d.decks; state.sealed=d.sealed||state.sealed; state.archive=d.archive||state.archive; }
      else { alert('Invalid backup file.'); return; }
      state.view={type:'deck',deckIndex:0}; save(); render();
      alert('Import successful!');
    }catch(err){ alert('Could not read file: '+err.message); }
  };
  r.readAsText(f); input.value='';
}
function resetToDefault(){
  if(!confirm('Reset ALL decks and sealed data to factory defaults?\n\nExport a backup first!'))return;
  if(!confirm('Are you really sure? This cannot be undone.'))return;
  state.decks=JSON.parse(JSON.stringify(BAKED_DECKS)); state.sealed=[]; state.archive=[];
  state.view={type:'deck',deckIndex:0}; save(); render();
}

// Prices — uses exact printing when set/cn available
async function refreshPrices(){
  const deck=state.decks[state.view.deckIndex];
  if((deck.game||'mtg')!=='mtg'){ alert('Price refresh is only available for Magic decks (Scryfall).'); return; }
  state.priceStatus='Fetching…';
  const ids=[]; const basics=['forest','island','swamp','mountain','plains'];
  for(const c of deck.cards){
    if(basics.includes(c.name.toLowerCase()))continue;
    ids.push(c.set&&c.cn ? {set:c.set,collector_number:''+c.cn} : {name:c.name.split('//')[0].split(' / ')[0].trim()});
  }
  let updated=0;
  for(let i=0;i<ids.length;i+=75){
    try{
      const resp=await fetch('https://api.scryfall.com/cards/collection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifiers:ids.slice(i,i+75)})});
      if(resp.ok){
        const data=await resp.json();
        for(const card of (data.data||[])){
          // Exact printing match first
          let m=deck.cards.find(c=>c.set&&c.cn&&(''+c.set).toLowerCase()===(''+card.set).toLowerCase()&&(''+c.cn).toLowerCase()===(''+card.collector_number).toLowerCase());
          // Name fallback ONLY for cards that have no set/cn — never overwrite an exact printing with base-card data
          if(!m){ const fn=card.name.split('//')[0].trim().toLowerCase();
            m=deck.cards.find(c=>!(c.set&&c.cn)&&c.name.split('//')[0].split(' / ')[0].trim().toLowerCase()===fn); }
          if(!m)continue;
          const price = m.foil
            ? parseFloat(card.prices?.usd_foil || card.prices?.usd_etched || card.prices?.usd || '0')
            : parseFloat(card.prices?.usd || card.prices?.usd_foil || '0');
          if(price>0){ m.price=price; updated++; }
        }
      }
    }catch(e){console.error(e);}
    await new Promise(r=>setTimeout(r,130));
  }
  state.priceStatus=''; save(); render();
  alert(`Updated ${updated} prices from Scryfall (exact printings where set codes exist).`);
}

const preview=document.getElementById('card-preview'), previewImg=document.getElementById('card-preview-img');
let previewTimeout; const imgCache={};
function positionPreview(e){
  const pw=265,ph=370; let x=e.clientX+18,y=e.clientY-ph/2;
  if(x+pw>window.innerWidth)x=e.clientX-pw-18;
  if(y<8)y=8; if(y+ph>window.innerHeight-8)y=window.innerHeight-ph-8;
  preview.style.left=x+'px'; preview.style.top=y+'px';
}
document.addEventListener('mouseover',e=>{
  const el=e.target.closest('[data-set]');
  if(el&&el.dataset.set&&el.dataset.cn){
    clearTimeout(previewTimeout);
    previewTimeout=setTimeout(()=>{
      const url=scryUrl(el.dataset.set,el.dataset.cn,'normal',el.dataset.game||'mtg');
      if(!url)return;
      if(!imgCache[url]){const im=new Image();im.src=url;imgCache[url]=im;}
      previewImg.src=url;
      preview.classList.toggle('foil-fx', el.dataset.foil==='1');
      positionPreview(e); preview.classList.add('visible');
    },180);
  }
});
document.addEventListener('mousemove',e=>{ if(preview.classList.contains('visible')&&!mobPreviewActive)positionPreview(e); });
document.addEventListener('mouseout',e=>{ if(e.target.closest&&e.target.closest('[data-set]')){clearTimeout(previewTimeout);if(!mobPreviewActive)preview.classList.remove('visible');} });

function mobilePreview(e, set, cn, game, foil){
  if(!isMobile()) return; // desktop name click does nothing extra (hover handles preview)
  e.stopPropagation();
  const url=scryUrl(set,cn,'normal',game);
  if(!url) return; // no set code yet — nothing to show
  previewImg.src=url;
  preview.classList.toggle('foil-fx', !!foil);
  // Center it
  const pw=Math.min(280, window.innerWidth-40);
  previewImg.style.width=pw+'px';
  preview.style.left=((window.innerWidth-pw)/2)+'px';
  preview.style.top=Math.max(20,(window.innerHeight-pw*1.4)/2)+'px';
  preview.classList.add('visible');
  mobBackdrop.classList.add('show');
  mobPreviewActive=true; mobPreviewShownAt=Date.now();
}
function hideMobPreview(){
  if(!mobPreviewActive) return;
  if(Date.now()-mobPreviewShownAt<250) return; // ignore the opening tap
  mobPreviewActive=false;
  preview.classList.remove('visible');
  mobBackdrop.classList.remove('show');
  previewImg.style.width='';
}
document.addEventListener('touchstart',()=>{clearTimeout(previewTimeout);hideMobPreview();},{passive:true});
document.addEventListener('scroll',()=>{hideMobPreview();},{passive:true,capture:true});
mobBackdrop.addEventListener('click',hideMobPreview);

// ═══════════ LOCK ═══════════
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
const EXPECTED_HASH='3be7a505483c0050243c5cbad4700da13925aa4137a55e9e33efd8bc4d05850f';
async function tryUnlock(){
  const v=document.getElementById('lock-input').value;
  if(await sha256(v)===EXPECTED_HASH){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('layout').style.display='flex';
    sessionStorage.setItem('vault-unlocked','1'); render();
  } else { document.getElementById('lock-error').textContent='Wrong password';
    document.getElementById('lock-input').value=''; document.getElementById('lock-input').focus(); }
}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('vault-unlocked')==='1'){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('layout').style.display='flex'; render();
  }
  document.getElementById('lock-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
});

// Block pinch zoom on touch devices only (double-tap is handled by touch-action: manipulation in CSS)
if (window.matchMedia('(pointer: coarse)').matches) {
  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('gesturechange', e=>e.preventDefault());
}

loadLocal();

let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(render,200);});

// Service worker
if('serviceWorker' in navigator){
  const sw=`const C='kenns-vault-v13';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl)).catch(()=>{});return r;}).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
