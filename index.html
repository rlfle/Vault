<script>
// Inline PWA manifest as blob URL
const manifest = {
  name: "Kenn's Vault",
  short_name: "Kenn's Vault",
  description: "MTG Deck Tracker",
  start_url: "./",
  display: "standalone",
  background_color: "#010409",
  theme_color: "#010409",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23010409'/><text x='50' y='50' font-size='60' text-anchor='middle' dominant-baseline='central'>🔒</text></svg>", sizes: "any", type: "image/svg+xml" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);

// Generate apple-touch-icon via canvas
function generateAppIcon() {
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  // Dark background with rounded feel
  ctx.fillStyle = '#010409';
  ctx.fillRect(0, 0, 180, 180);
  // Lock emoji
  ctx.font = '120px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔒', 90, 95);
  // Set as apple-touch-icon
  const iconLink = document.createElement('link');
  iconLink.rel = 'apple-touch-icon';
  iconLink.href = canvas.toDataURL('image/png');
  document.head.appendChild(iconLink);
}
generateAppIcon();
</script>
<style>
:root {
  --bg: #010409; --surface: #0d1117; --surface2: #161b22; --border: #21262d;
  --text: #c9d1d9; --text-dim: #8b949e; --text-bright: #e6edf3;
  --green: #52b788; --green-dark: #2d6a4f; --green-bg: #132d1b;
  --red: #f85149; --orange: #f0883e; --blue: #79c0ff; --purple: #bc8cff;
  --gold: #d2a679;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 940px; margin: 0 auto; padding: 12px 16px 60px; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header { padding: 18px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 20px; font-weight: 700; color: var(--text-bright); }
.header-actions { display: flex; gap: 8px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg); color: var(--text-dim); white-space: nowrap; transition: all .2s; }
.tab.active { border-color: var(--green-dark); border-bottom: 2px solid var(--green); background: var(--surface); color: var(--green); }
.tab:hover:not(.active) { color: var(--text); }

/* Deck Header */
.deck-header { background: linear-gradient(135deg, var(--surface) 0%, #1a2e1a 100%); border: 1px solid #2d3a2e; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.deck-title { font-size: 18px; color: var(--text-bright); font-weight: 700; }
.deck-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.gc-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.gc-badge.safe { background: rgba(45,106,79,.15); border: 1px solid var(--green-dark); color: var(--green); }
.gc-badge.warn { background: rgba(248,81,73,.15); border: 1px solid var(--red); color: var(--red); }

/* Progress */
.progress-wrap { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
.progress-bar { flex: 1; height: 10px; background: #1a1a2e; border-radius: 5px; overflow: hidden; border: 1px solid #2d3a2e; }
.progress-fill { height: 100%; border-radius: 5px; transition: width .4s; background: linear-gradient(90deg, var(--green-dark), var(--green)); }
.progress-text { font-size: 13px; color: var(--green); font-weight: 600; white-space: nowrap; }

/* Stats */
.stats { display: flex; gap: 8px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 72px; }
.stat-val { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }

/* Strategy */
.strategy-toggle { background: none; border: 1px solid #2d3a2e; color: var(--green); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-family: inherit; }
.strategy-toggle:hover { border-color: var(--green-dark); }
.strategy-panel { background: var(--surface); border: 1px solid #2d3a2e; border-radius: 0 0  8px 8px; padding: 16px; margin-top: -17px; margin-bottom: 16px; }
.strat-section { font-size: 13px; text-transform: uppercase; letter-spacing: .8px; margin: 0 0 8px; font-weight: 700; }
.strat-item { background: var(--surface2); border-radius: 6px; padding: 8px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
.strat-item .title { font-size: 12px; font-weight: 600; }
.strat-item .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.combo-row { display: grid; grid-template-columns: 1fr auto 1fr auto 2fr; gap: 8px; align-items: center; font-size: 11px; }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filters input, .filters select { padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit; }
.filters input { flex: 1 1 160px; }
.filters input:focus, .filters select:focus { outline: none; border-color: var(--green-dark); }
.filter-count { font-size: 11px; color: var(--text-dim); }

/* Table */
.table-wrap { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.table-header { display: grid; background: var(--surface2); border-bottom: 2px solid var(--green-dark); }
.table-header button { background: none; border: none; color: var(--text-dim); padding: 10px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: color .2s; white-space: nowrap; }

.table-body { max-height: 520px; overflow-y: auto; }

.type-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; white-space: nowrap; display: inline-block; }

/* Price */
.price { font-size: 12px; color: var(--gold); }
.price-total { font-size: 14px; font-weight: 700; color: var(--gold); }

.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all .2s; }
.btn:hover { border-color: var(--green-dark); color: var(--green); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-green { background: var(--green-dark); border-color: var(--green); color: #fff; }

.btn-red { border-color: var(--red); color: var(--red); }

.modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 12px; }

.modal input:focus, .modal select:focus { outline: none; border-color: var(--green-dark); }

.gc-check input[type=checkbox] { accent-color: var(--red); width: 16px; height: 16px; }

.price-status { font-size: 11px; color: var(--text-dim); padding: 4px 0; }

/* Footer */
.footer { margin-top: 16px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 11px; color: #484f58; }

/* Hidden */

/* Scrollbar */

@media (max-width: 640px) {

  .table-wrap { overflow: hidden; }
  .table-body { max-height: 60vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

  .modal h3 { font-size: 15px; }
  .modal textarea { font-size: 11px; }

<script>
// Password gate — hash comparison so password isn't in plain text
// SHA-256 of "magic"
const PASS_HASH = 'a]b]c'; // placeholder replaced below
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
const EXPECTED_HASH = '3be7a505483c0050243c5cbad4700da13925aa4137a55e9e33efd8bc4d05850f'; // sha256("magic")

async function tryUnlock() {
  const input = document.getElementById('lock-input').value;
  const hash = await sha256(input);
  if (hash === EXPECTED_HASH) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('vault-unlocked', '1');
  } else {
    document.getElementById('lock-error').textContent = 'Wrong password';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', () => {
  // Stay unlocked for this browser session
  if (sessionStorage.getItem('vault-unlocked') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }
  document.getElementById('lock-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
});

const db = firebase.database();
const decksRef = db.ref('decks');

let firebaseConnected = false;
let saving = false;

// Save to both Firebase and localStorage
function save() {
  // Always save to localStorage as fallback
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.decks)); } catch(e) {}
  // Save to Firebase
  if (firebaseConnected && !saving) {
    saving = true;
    decksRef.set(state.decks).then(() => {
      saving = false;
      state.syncStatus = '✓ Synced';
      updateSyncBadge();
    }).catch(err => {
      saving = false;
      state.syncStatus = '⚠ Sync failed';
      updateSyncBadge();
      console.error('Firebase save error:', err);
    });
  }
}

// Load from localStorage (immediate, for fast startup)
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.length) { state.decks = d; return true; }
  } catch(e) {}
  return false;
}

// Update just the sync badge without full re-render
function updateSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (el) {
    el.textContent = state.syncStatus;
    el.style.color = state.syncStatus.includes('✓') ? 'var(--green)' : state.syncStatus.includes('⚠') ? 'var(--orange)' : 'var(--text-dim)';
  }
}

// Listen for Firebase changes (real-time sync across devices)
function initFirebase() {
  // Check connection status
  db.ref('.info/connected').on('value', snap => {
    if (snap.val() === true) {
      firebaseConnected = true;
      state.syncStatus = '✓ Synced';
    } else {
      firebaseConnected = false;
      state.syncStatus = '⚡ Offline';
    }
    updateSyncBadge();
  });

  // Listen for data changes from other devices
  decksRef.on('value', snap => {
    const data = snap.val();
    if (data && Array.isArray(data) && data.length > 0 && !saving) {
      state.decks = data;
      // Also update localStorage
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      state.syncStatus = '✓ Synced';
      render();
    }
  }, err => {
    console.error('Firebase read error:', err);
    state.syncStatus = '⚠ Read failed';
    updateSyncBadge();
  });
}

// PRICE FETCH (Scryfall — runs in browser, not blocked)
// ═══════════════════════════════════════════════════════
async function refreshPrices() {
  const deck = state.decks[state.activeDeck];
  state.priceStatus = 'Fetching prices...';
  render();
  let updated = 0;
  const names = deck.cards.filter(c => c.name !== 'Forest' && c.name !== 'Swamp' && c.name !== 'Island' && c.name !== 'Mountain' && c.name !== 'Plains').map(c => c.name);
  // Batch via collection endpoint
  const batches = [];
  for (let i = 0; i < names.length; i += 75) batches.push(names.slice(i, i + 75));
  for (const batch of batches) {
    try {
      const resp = await fetch('https://api.scryfall.com/cards/collection', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiers: batch.map(n => ({ name: n })) })
      });
      if (resp.ok) {
        const data = await resp.json();
        for (const card of (data.data || [])) {
          const price = parseFloat(card.prices?.usd || card.prices?.usd_foil || '0');
          const match = deck.cards.find(c => c.name.toLowerCase() === card.name.toLowerCase());
          if (match && price > 0) { match.price = price; updated++; }
        }
      }
    } catch(e) { console.error('Scryfall batch error:', e); }
    await new Promise(r => setTimeout(r, 150));
  }
  state.priceStatus = `Updated ${updated} prices from Scryfall`;
  save(); render();
  setTimeout(() => { state.priceStatus = ''; render(); }, 4000);
}

function typeBadge(type) {

function render() {

  const gcCount = cards.filter(c => c.gameChanger).length;
  const pct = total > 0 ? Math.round(ownedTotal / total * 100) : 0;
  const totalPrice = cards.reduce((s,c) => s + (c.price * c.qty), 0);
  const ownedPrice = cards.filter(c => c.owned).reduce((s,c) => s + (c.price * c.qty), 0);
  const needPrice = totalPrice - ownedPrice;

  // Filter & sort

  if (state.filterType !== 'All') display = display.filter(c => c.type === state.filterType);

  if (state.search) { const q = state.search.toLowerCase(); display = display.filter(c => c.name.toLowerCase().includes(q)); }
  if (state.sort.field) {
    display.sort((a,b) => {
      let va = a[state.sort.field], vb = b[state.sort.field];
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (typeof va === 'boolean') { va = va?1:0; vb = vb?1:0; }
      if (va < vb) return state.sort.dir === 'asc' ? -1 : 1;

// Export all deck data as a JSON file
function exportData() {
  const data = JSON.stringify(state.decks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `kenns_vault_backup_${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Import deck data from a JSON file
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data) && data.length > 0 && data[0].cards) {
        state.decks = data;
        state.activeDeck = 0;
        save();
        render();
        alert('Import successful! ' + data.length + ' deck(s) loaded.');
      } else {
        alert('Invalid file — expected a Kenn\'s Vault backup JSON.');
      }
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = ''; // reset so same file can be re-imported
}
function switchDeck(i) { state.activeDeck = i; state.sort = {field:null,dir:'asc'}; state.filterType='All'; state.filterRole='All'; state.search=''; state.strategyOpen=false; state.editingCard=null; render(); }
function renameDeck() {
  const deck = state.decks[state.activeDeck];
  const newName = prompt('Rename deck:', deck.name);
  if (newName && newName.trim()) {
    deck.name = newName.trim();
    save();
    render();
  }
}
function toggleSort(field) { if (state.sort.field===field) state.sort.dir = state.sort.dir==='asc'?'desc':'asc'; else { state.sort.field=field; state.sort.dir='asc'; } render(); }
function setSearch(v) { state.search = v; render(); requestAnimationFrame(() => { const inp = document.querySelector('.filters input[type="text"]'); if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); } }); }
function setFilterType(v) { state.filterType = v==='All Types'?'All':v; render(); }
function setFilterRole(v) { state.filterRole = v==='All Roles'?'All':v; render(); }
function toggleStrategy() { state.strategyOpen = !state.strategyOpen; render(); }
function toggleOwned(idx) {
  state.decks[state.activeDeck].cards[idx].owned = !state.decks[state.activeDeck].cards[idx].owned;
  save();
  // Surgical update: find the row in the DOM and update it without full re-render
  const tableBody = document.querySelector('.table-body');
  if (tableBody) {
    const scrollPos = tableBody.scrollTop;
    render();
    requestAnimationFrame(() => {
      const newBody = document.querySelector('.table-body');
      if (newBody) newBody.scrollTop = scrollPos;
    });
  } else { render(); }
}
function editCard(idx) { state.editingCard = idx; render(); }
function closeEdit() { state.editingCard = null; render(); }
function saveEdit() {
  const card = state.decks[state.activeDeck].cards[state.editingCard];
  card.name = document.getElementById('edit-name').value.trim() || card.name;
  card.role = document.getElementById('edit-role').value.trim() || card.role;
  card.type = document.getElementById('edit-type').value;
  card.qty = parseInt(document.getElementById('edit-qty').value) || 1;
  card.price = parseFloat(document.getElementById('edit-price').value) || 0;
  card.gameChanger = document.getElementById('edit-gc').checked;
  card.notes = document.getElementById('edit-notes').value;
  state.editingCard = null;
  save(); render();
}

function addCard() {
  const name = prompt('Card name:');
  if (!name || !name.trim()) return;
  const deck = state.decks[state.activeDeck];
  deck.cards.push(makeCard(name.trim(), 1, 'Uncategorized', 'Creature', false, 0));
  save(); render();
  // Open edit modal on the new card so they can fill in details
  state.editingCard = deck.cards.length - 1;
  render();
}

function removeCard(idx) {
  const deck = state.decks[state.activeDeck];
  const card = deck.cards[idx];
  if (confirm(`Remove "${card.name}" from ${deck.name}?`)) {
    deck.cards.splice(idx, 1);
    save(); render();
  }
}

function showImportDeck() {
  state.showImportDeck = true;
  render();
}

function parseDeckList(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('//') && !l.startsWith('#'));
  const cards = [];
  for (const line of lines) {
    // Match: qty cardname (optional set code, collector number, foil marker)
    const match = line.match(/^(\d+)\s+(.+?)(?:\s+\([A-Z0-9]+\)\s*\d*.*)?$/);
    if (match) {
      let qty = parseInt(match[1]);
      let name = match[2].replace(/\s*\*F\*\s*$/, '').replace(/\s*\([A-Z0-9]+\)\s*\d*.*$/, '').trim();
      // Check if this card already exists in our list (combine quantities)
      const existing = cards.find(c => c.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        existing.qty += qty;
      } else {
        // Auto-detect type from name heuristics
        let type = 'Creature';
        const nameLower = name.toLowerCase();
        if (['forest','island','swamp','mountain','plains'].includes(nameLower) ||
            nameLower.includes('pathway') || nameLower.includes('foundry') || nameLower.includes('forge') ||
            nameLower.includes('retreat') || nameLower.includes('pass') || nameLower.includes('prairie') ||
            nameLower.includes('mesa') || nameLower.includes('canyon') || nameLower.includes('verge') ||
            nameLower.includes('garrison') || nameLower.includes('tower') || nameLower.includes('enclave') ||
            nameLower.includes('stronghold') || nameLower.includes('saga') || nameLower.includes('snarl') ||
            nameLower.includes('seating') || nameLower.includes('parlor') || nameLower.includes('peaks') ||
            nameLower.includes('passage') || nameLower.includes('arena of') || nameLower.includes('flagstones') ||
            nameLower.includes('eiganjo') || nameLower.includes('sokenzan') || nameLower.includes('spire of') ||
            nameLower.includes('sunhome') || nameLower.includes('slayers\'')) {
          type = 'Land';
        }
        let role = type === 'Land' ? 'Land' : 'Uncategorized';
        cards.push(makeCard(name, qty, role, type, false, 0));
      }
    }
  }
  return cards;
}

function importDeckList() {
  const name = document.getElementById('import-deck-name').value.trim();
  const cmdr = document.getElementById('import-deck-cmdr').value.trim();
  const bracket = parseInt(document.getElementById('import-deck-bracket').value) || 3;
  const owned = document.getElementById('import-deck-owned').value === 'true';
  const listText = document.getElementById('import-deck-list').value;

  if (!name) { alert('Please enter a deck name.'); return; }
  if (!listText.trim()) { alert('Please paste a deck list.'); return; }

  const cards = parseDeckList(listText);
  if (cards.length === 0) { alert('Could not parse any cards from the list. Make sure each line starts with a number.'); return; }

  // Set owned status
  if (owned) cards.forEach(c => c.owned = true);

  // Set commander
  if (cmdr) {
    const cmdrCard = cards.find(c => c.name.toLowerCase() === cmdr.toLowerCase());
    if (cmdrCard) cmdrCard.role = 'Commander';
  }

  const newDeck = {
    id: 'deck-' + Date.now(),
    name: name,
    commander: cmdr || 'Unknown',
    colors: [],
    bracket: bracket,
    strategy: null,
    cards: cards
  };

  state.decks.push(newDeck);
  state.activeDeck = state.decks.length - 1;
  state.showImportDeck = false;
  save(); render();

  const total = cards.reduce((s,c) => s + c.qty, 0);
  alert(`Imported "${name}" with ${cards.length} unique cards (${total} total). Use ✏️ to set roles and types, and 💰 Refresh Prices to fetch prices.`);
}

function deleteDeck() {
  if (state.decks.length <= 1) { alert('Cannot delete the last deck.'); return; }
  const deck = state.decks[state.activeDeck];
  if (confirm(`Delete "${deck.name}"? This cannot be undone.`)) {
    state.decks.splice(state.activeDeck, 1);
    state.activeDeck = 0;
    save(); render();
  }
}

function resetToDefault() {
  if (!confirm('Reset ALL decks to the factory defaults?\n\nThis will erase all your changes, owned checkmarks, and custom decks.\n\nMake sure you\'ve exported a backup first!')) return;
  if (!confirm('Are you really sure? This cannot be undone.')) return;
  state.decks = [
    JSON.parse(JSON.stringify(DECK_WITHERBLOOM)),
    JSON.parse(JSON.stringify(DECK_ZIMONE)),
    JSON.parse(JSON.stringify(DECK_LIGHTNING))
  ];
  state.activeDeck = 0;
  save(); render();
  alert('Reset complete. All decks restored to defaults.');
}

// Load localStorage first for instant render
loadLocal();
render();
// Then connect to Firebase for real-time sync
initFirebase();
// Re-render on resize (orientation change)
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(render, 200); });

// ═══════════════════════════════════════════════════════
// SERVICE WORKER (inline, for offline PWA support)
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'kenns-vault-v1';
    const URLS_TO_CACHE = ['./', './index.html'];

    self.addEventListener('install', event => {
      event.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.addAll(URLS_TO_CACHE))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', event => {
      event.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', event => {
      event.respondWith(
        fetch(event.request)
          .then(response => {
            const clone = response.clone();
            caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
            return response;
          })
          .catch(() => caches.match(event.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {
    // Blob SW may fail on some hosts — try registering sw.js as fallback
    // This is fine — the app still works, just without offline caching
  });
}
