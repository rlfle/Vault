<style>
:root {
  --bg: #05070b;
  --glass: rgba(255,255,255,0.035);
  --glass-2: rgba(255,255,255,0.055);
  --glass-hi: rgba(255,255,255,0.09);
  --stroke: rgba(255,255,255,0.07);
  --stroke-hi: rgba(255,255,255,0.14);
  --text: #cdd5dd;
  --text-dim: #7d8893;
  --text-bright: #f0f4f8;
  --green: #34d399; --green-deep: #0d9466; --green-bg: rgba(20,83,55,0.28);
  --gold: #e8c468; --gold-dim: #b69247;
  --red: #f87171; --orange: #fbab60; --blue: #7cc4ff; --purple: #c4a5ff;
  --sidebar-w: 248px;
  --radius: 16px;
}
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
html { height:100%; overflow-x:hidden; }
body {
  font-family:'Space Grotesk',sans-serif; color:var(--text); min-height:100%;
  background: var(--bg);
  -webkit-text-size-adjust:100%; overflow-x:hidden; width:100%;
}
/* Ambient gradient layer — fixed pseudo-element instead of background-attachment:fixed (which breaks wheel scrolling with backdrop-filter) */
body::before {
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 15% -5%, rgba(16,148,102,0.10), transparent),
    radial-gradient(ellipse 55% 40% at 95% 8%, rgba(99,82,255,0.07), transparent),
    radial-gradient(ellipse 60% 50% at 70% 110%, rgba(232,196,104,0.05), transparent);
}
.mono { font-family:'JetBrains Mono',monospace; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
input, select, textarea, button { font-family:inherit; color:var(--text); }
input, select, textarea {
  background: rgba(0,0,0,0.35); border:1px solid var(--stroke); border-radius:10px;
  padding:10px 14px; font-size:16px; outline:none; transition:border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--green-deep); }

/* ── Glass panel ── */
.glass {
  background: var(--glass);
  backdrop-filter: blur(22px) saturate(1.3);
  -webkit-backdrop-filter: blur(22px) saturate(1.3);
  border: 1px solid var(--stroke);
  border-radius: var(--radius);
}

/* ── Layout ── */
#layout { display:flex; min-height:100vh; }
#sidebar {
  width: var(--sidebar-w); flex-shrink:0; position:fixed; top:0; left:0; bottom:0; z-index:50;
  background: rgba(8,11,16,0.72);
  backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border-right: 1px solid var(--stroke);
  display:flex; flex-direction:column;
  padding: calc(18px + env(safe-area-inset-top, 0px)) 12px calc(14px + env(safe-area-inset-bottom, 0px));
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
#sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
#main { flex:1; margin-left: var(--sidebar-w);
  padding: calc(22px + env(safe-area-inset-top, 0px)) 26px calc(80px + env(safe-area-inset-bottom, 0px));
  max-width: 1060px; transition: margin-left .28s cubic-bezier(.4,0,.2,1); min-width:0; }
#main.full { margin-left: 0; }
#main.browse-wide { max-width: 1560px; }

.brand { display:flex; align-items:center; gap:10px; padding:4px 10px 16px; }
.brand .lock { font-size:20px; filter: drop-shadow(0 0 12px rgba(232,196,104,0.35)); }
.brand h1 { font-size:16px; font-weight:700; color:var(--text-bright); letter-spacing:-0.3px; font-family:'JetBrains Mono',monospace; }
.brand .sub { font-size:9px; color:var(--gold-dim); letter-spacing:2.5px; text-transform:uppercase; }

.nav-section { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-dim); padding:14px 12px 6px; font-weight:600; }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:11px; cursor:pointer;
  font-size:13px; font-weight:500; color:var(--text-dim); transition: all .18s; border:1px solid transparent;
  margin-bottom:2px; user-select:none;
}
.nav-item:hover { color:var(--text-bright); background:var(--glass); }
.nav-item.active {
  color:var(--green); background: linear-gradient(135deg, rgba(20,148,102,0.13), rgba(20,148,102,0.04));
  border-color: rgba(52,211,153,0.22);
  box-shadow: 0 0 18px rgba(16,148,102,0.10) inset;
}
.nav-item .ico { width:18px; text-align:center; font-size:14px; }
.nav-item .cnt { margin-left:auto; font-size:10px; font-family:'JetBrains Mono',monospace; opacity:.7; }
.nav-item.small { font-size:12px; padding:7px 12px; }
.sidebar-footer { margin-top:auto; padding-top:14px; border-top:1px solid var(--stroke); display:flex; flex-direction:column; gap:6px; }
#sync-badge { font-size:10px; color:var(--text-dim); text-align:center; padding:4px; font-family:'JetBrains Mono',monospace; }

/* ── Buttons ── */
.btn {
  padding:8px 16px; border-radius:11px; border:1px solid var(--stroke); background:var(--glass);
  font-size:12px; cursor:pointer; font-weight:500; transition:all .2s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.btn:hover { border-color:var(--stroke-hi); background:var(--glass-2); color:var(--text-bright); }
.btn-green { background: linear-gradient(135deg, rgba(13,148,102,0.85), rgba(9,110,76,0.85)); border-color:rgba(52,211,153,0.4); color:#fff; }
.btn-green:hover { background: linear-gradient(135deg, rgba(16,180,124,0.9), rgba(13,148,102,0.9)); }
.btn-red { border-color: rgba(248,113,113,0.35); color:var(--red); }
.btn-red:hover { background: rgba(248,113,113,0.08); }
.btn-sm { padding:5px 11px; font-size:11px; }
.btn-block { width:100%; text-align:center; }

/* ── Topbar ── */
.topbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
#menu-toggle { display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:11px; cursor:pointer; font-size:16px; border:1px solid var(--stroke); background:var(--glass); flex-shrink:0; backdrop-filter:blur(10px); }
.topbar h2 { font-size:19px; color:var(--text-bright); font-weight:700; letter-spacing:-0.4px; }
.topbar .spacer { flex:1; }

/* ── Deck hero ── */
.deck-hero { padding:20px 22px; margin-bottom:16px; position:relative; overflow:hidden; }
.deck-hero::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg, rgba(16,148,102,0.07), transparent 50%); pointer-events:none; }
.deck-hero .row1 { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px; }
.deck-title { font-size:19px; color:var(--text-bright); font-weight:700; font-family:'JetBrains Mono',monospace; display:flex; align-items:center; gap:8px; }
.deck-sub { font-size:12px; color:var(--text-dim); margin-top:3px; }
.gc-badge { padding:5px 13px; border-radius:20px; font-size:11px; font-weight:600; backdrop-filter:blur(8px); }
.gc-badge.safe { background:rgba(20,148,102,0.12); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
.gc-badge.warn { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.35); color:var(--red); }

.progress-wrap { display:flex; align-items:center; gap:12px; padding:14px 0 12px; }
.progress-bar { flex:1; height:8px; background:rgba(0,0,0,0.4); border-radius:4px; overflow:hidden; border:1px solid var(--stroke); }
.progress-fill { height:100%; border-radius:4px; transition:width .5s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg, var(--green-deep), var(--green)); box-shadow:0 0 12px rgba(52,211,153,0.4); }
.progress-text { font-size:12px; color:var(--green); font-weight:600; white-space:nowrap; }

.stats { display:flex; gap:8px; flex-wrap:wrap; }
.stat { background:rgba(0,0,0,0.28); border:1px solid var(--stroke); border-radius:13px; padding:9px 15px; text-align:center; min-width:76px; backdrop-filter:blur(8px); }
.stat-val { font-size:17px; font-weight:700; }
.stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.2px; margin-top:3px; }
.warn-banner { margin-top:12px; padding:7px 14px; border-radius:10px; font-size:12px; font-weight:600; }

/* ── Strategy ── */
.strategy-toggle { width:100%; display:flex; justify-content:space-between; align-items:center; padding:11px 18px; margin-bottom:14px; cursor:pointer; font-size:13px; font-weight:600; color:var(--green); }
.strategy-panel { padding:18px; margin:-10px 0 16px; }
.strat-section { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; margin:0 0 8px; font-weight:700; }
.strat-item { background:rgba(0,0,0,0.25); border-radius:11px; padding:9px 13px; border:1px solid var(--stroke); margin-bottom:6px; }
.strat-item .title { font-size:12px; font-weight:600; }
.strat-item .desc { font-size:11px; color:var(--text-dim); margin-top:2px; }
.combo-row { display:grid; grid-template-columns:1fr auto 1fr auto 2fr; gap:8px; align-items:center; font-size:11px; }

/* ── Filters ── */
.filters { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.filters input[type=text] { flex:1 1 170px; font-size:14px; padding:9px 14px; }
.filters select { font-size:12px; padding:8px 10px; cursor:pointer; }
.filter-count { font-size:11px; color:var(--text-dim); }

/* ── Table ── */
.table-wrap { border-radius:var(--radius); overflow:hidden; border:1px solid var(--stroke); background:var(--glass); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
.table-header { display:grid; background:rgba(0,0,0,0.35); border-bottom:1px solid rgba(52,211,153,0.25); }
.table-header button { background:none; border:none; color:var(--text-dim); padding:11px 6px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:color .2s; white-space:nowrap; }
.table-header button.sorted { color:var(--green); }
.table-header button:hover { color:var(--text-bright); }
.sort-icon { margin-left:3px; font-size:8px; }
.table-row { display:grid; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; transition:background .12s; align-items:center; }
.table-row:hover { background:var(--glass-2) !important; }
.table-row.owned { background:var(--green-bg) !important; }
.cb { width:20px; height:20px; border-radius:6px; border:1.5px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; transition:all .15s; margin:0 auto; }
.cb.checked { border-color:var(--green); background:linear-gradient(135deg, var(--green-deep), #0a7350); box-shadow:0 0 8px rgba(52,211,153,0.35); }
.cb.checked::after { content:'✓'; color:#fff; font-size:12px; font-weight:700; }
.cb.partial { border-color:var(--gold); background:linear-gradient(135deg, var(--gold-dim), #8a6d2e); box-shadow:0 0 8px rgba(232,196,104,0.3); }
.table-row.partial { }
.section-header { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; background:rgba(0,0,0,0.35); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--stroke); position:sticky; top:0; z-index:5; backdrop-filter:blur(8px); }
.type-badge { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; white-space:nowrap; display:inline-block; }
.price { font-size:12px; color:var(--gold); }
.no-preview { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--orange); opacity:.65; margin-left:5px; vertical-align:middle; }

/* ── Card hover preview ── */
#card-preview { position:fixed; z-index:300; pointer-events:none; display:none; filter:drop-shadow(0 16px 40px rgba(0,0,0,.7)); opacity:0; transition:opacity .15s; }
#card-preview.visible { display:block; opacity:1; }
#card-preview img { width:255px; border-radius:13px; display:block; }

/* ── Foil holo shimmer ── */
.foil-fx { position:relative; }
.foil-fx::after {
  content:''; position:absolute; inset:0; border-radius:13px; pointer-events:none;
  background:
    linear-gradient(115deg, rgba(255,60,60,.32) 0%, rgba(255,170,0,.22) 14%, rgba(230,255,40,.20) 28%, rgba(60,255,140,.22) 42%, rgba(40,230,255,.28) 56%, rgba(60,120,255,.30) 70%, rgba(170,60,255,.28) 84%, rgba(255,60,200,.30) 100%);
  mix-blend-mode: screen; opacity:.5;
  animation: foilShift 4s ease-in-out infinite alternate;
}
@keyframes foilShift { from { filter:hue-rotate(0deg); opacity:.42; } to { filter:hue-rotate(40deg); opacity:.58; } }
#card-preview.foil-fx::after { border-radius:13px; }
.trophy-card .foil-fx, .trophy-card .foil-fx img { border-radius:9px; }
.trophy-card .foil-fx::after { border-radius:9px; }

/* Mobile tap preview backdrop */
#mob-preview-backdrop { display:none; position:fixed; inset:0; z-index:290; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
#mob-preview-backdrop.show { display:block; }

/* ── Trophy Room ── */
.trophy-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:16px; }
.trophy-card { padding:12px; text-align:center; transition:transform .2s, box-shadow .2s; position:relative; }
.trophy-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.45); }
.trophy-card img { width:100%; border-radius:9px; display:block; }
.trophy-card .ph { width:100%; aspect-ratio:5/7; border-radius:9px; background:rgba(0,0,0,0.35); border:1px dashed var(--stroke-hi); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; color:var(--text-dim); font-size:11px; padding:10px; }
.trophy-card .tname { font-size:11.5px; color:var(--text-bright); font-weight:600; margin-top:9px; line-height:1.3; }
.trophy-card .tprice { font-size:14px; color:var(--gold); font-weight:700; font-family:'JetBrains Mono',monospace; margin-top:2px; }
.trophy-card .tdeck { font-size:9.5px; color:var(--text-dim); margin-top:2px; }
.trophy-rank { position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); border:1px solid var(--gold-dim); color:var(--gold); font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:10px; z-index:2; }

/* ── Sealed Tracker ── */
.sealed-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:18px; }
.sealed-stat { padding:16px; text-align:center; }
.sealed-stat .v { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.sealed-stat .l { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }
.opening { padding:16px 18px; margin-bottom:12px; }
.opening .head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.opening .pname { font-size:14px; font-weight:700; color:var(--text-bright); }
.opening .pdate { font-size:11px; color:var(--text-dim); margin-top:2px; }
.pl-badge { padding:4px 12px; border-radius:16px; font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.pl-pos { background:rgba(20,148,102,0.13); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
.pl-neg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); color:var(--red); }
.pulls { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.pull { text-align:center; width:78px; }
.pull img { width:78px; border-radius:5px; display:block; }
.pull .pn { font-size:8.5px; color:var(--text-dim); margin-top:3px; line-height:1.2; }
.pull .pv { font-size:10px; color:var(--gold); font-weight:600; font-family:'JetBrains Mono',monospace; }

/* ── Modals ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:rgba(14,18,24,0.92); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px); border:1px solid var(--stroke-hi); border-radius:20px; padding:26px 24px; width:92%; max-width:460px; max-height:88vh; overflow-y:auto; overscroll-behavior:contain; }
.modal h3 { font-size:16px; color:var(--text-bright); margin-bottom:16px; }
.modal label { display:block; font-size:11px; color:var(--text-dim); margin:12px 0 5px; text-transform:uppercase; letter-spacing:1px; }
.modal input, .modal select, .modal textarea { width:100%; }
.modal-actions { display:flex; gap:8px; margin-top:22px; justify-content:flex-end; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

#sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; backdrop-filter:blur(3px); }

/* ── Lock Screen ── */
#lock-screen { position:fixed; inset:0; background:var(--bg);
  background-image: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(16,148,102,0.12), transparent), radial-gradient(ellipse 50% 40% at 50% 110%, rgba(232,196,104,0.07), transparent);
  display:flex; align-items:center; justify-content:center; z-index:9999; }
.lock-box { padding:44px 38px; text-align:center; width:90%; max-width:360px; }
.lock-icon { font-size:44px; margin-bottom:14px; filter:drop-shadow(0 0 20px rgba(232,196,104,0.4)); }
#lock-screen h2 { font-size:22px; color:var(--text-bright); margin-bottom:4px; font-family:'JetBrains Mono',monospace; }
.lock-sub { font-size:12px; color:var(--text-dim); margin-bottom:24px; }
#lock-input { width:100%; text-align:center; letter-spacing:3px; }
.lock-btn { width:100%; margin-top:12px; padding:12px; }
.lock-error { color:var(--red); font-size:12px; margin-top:10px; min-height:18px; }

.footer-note { margin-top:18px; padding:11px 16px; font-size:10.5px; color:rgba(125,136,147,0.7); }

/* ── Mobile ── */
@media (max-width: 760px) {
  body { touch-action: manipulation; overscroll-behavior-y: contain; }
  #sidebar { transform:translateX(calc(-1 * var(--sidebar-w))); }
  #sidebar.open { transform:translateX(0); box-shadow:20px 0 60px rgba(0,0,0,0.5); }
  #sidebar-overlay.show { display:block; }
  #main { margin-left:0; padding: calc(12px + env(safe-area-inset-top, 0px)) 10px calc(70px + env(safe-area-inset-bottom, 0px)); }
  .table-row { touch-action:pan-y; }
  .deck-hero { padding:15px; }
  .deck-title { font-size:15px; }
  .stat { min-width:58px; padding:7px 9px; }
  .stat-val { font-size:14px; }
  .combo-row { grid-template-columns:1fr; gap:2px; }
  .modal-overlay { align-items:flex-end; }
  .modal { width:100%; max-width:100%; border-radius:22px 22px 0 0; padding:22px 18px calc(34px + env(safe-area-inset-bottom, 0px)); }
  .trophy-grid { grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px; }
  .filters select { flex:1; min-width:0; }
  .topbar h2 { font-size:16px; }
}
/* ═══════════ OVERHAUL: STICKY TOPBAR ═══════════ */

.br-set { position:relative; overflow:hidden; min-height:96px; }
.br-set .banner { position:absolute; inset:0; background-size:cover; background-position:center 22%; opacity:.55; }
.br-set::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,11,17,.45) 0%, rgba(8,11,17,.82) 70%, rgba(8,11,17,.95) 100%); }
.br-set > * { position:relative; z-index:1; }

@media (max-width:900px){ .br-aside { display:none; } .br-split { display:block; padding:0 12px 20px; } }
.br-top3 { padding:6px 4px 12px; }
.br-top3-h { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim); font-weight:700; margin:0 0 8px 4px; }
.br-top3-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.br-top3-c { border:1px solid rgba(232,196,104,.4); border-radius:11px; overflow:hidden; cursor:pointer; background:var(--glass); }
.br-top3-c img, .br-top3-c .t3ph { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:rgba(0,0,0,.35); }
.br-top3-c .t3ph { display:flex; align-items:center; justify-content:center; font-size:20px; }
.br-top3-c .t3n { font-size:11px; font-weight:600; color:var(--text-bright); padding:5px 6px 0; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.br-top3-c .t3p { font-size:12px; font-weight:800; color:var(--gold); padding:1px 6px 6px; }

/* ═══════════ OVERHAUL: DASHBOARD / STAT CARDS ═══════════ */
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 16px; }
.stat-card { background: var(--glass); border: 1px solid var(--stroke); border-radius: 14px; padding: 16px; }
.stat-card .sc-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 6px; }
.stat-card .sc-val { font-size: 26px; font-weight: 700; color: var(--text-bright); }
.stat-card .sc-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.stat-card .sc-val.green { color: var(--green); } .stat-card .sc-val.gold { color: var(--gold); }
.mover-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--stroke); cursor: pointer; }
.mover-row:active { background: var(--glass); }
.mover-row .mv-name { flex: 1; font-size: 13px; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mover-row .mv-price { font-size: 13px; font-weight: 600; color: var(--text-bright); }
.mover-row .mv-chg { font-size: 12px; font-weight: 700; min-width: 58px; text-align: right; }
.mv-chg.up { color: var(--green); } .mv-chg.down { color: var(--red); }
.wish-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid var(--stroke); }
.wish-row .w-name { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wish-row .w-deck { font-size: 11px; color: var(--text-dim); }
.wish-row .w-price { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 60px; text-align: right; }
.completion-bar { height: 8px; background: var(--glass-hi); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.completion-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--green-deep), var(--green)); border-radius: 4px; }
.price-chg { font-size: 10px; font-weight: 700; margin-left: 5px; }
.price-chg.up { color: var(--green); } .price-chg.down { color: var(--red); }
.card-name-tap { cursor: pointer; }
.card-name-tap:active { opacity: 0.6; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box glass">
    <div class="lock-icon">🔒</div>
    <h2>Kenn's Vault</h2>
    <div class="lock-sub">Enter password to access your collection</div>
    <input type="password" id="lock-input" placeholder="••••••" autofocus>
    <button class="btn btn-green lock-btn" onclick="tryUnlock()">Unlock</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div id="layout" style="display:none">
  <div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
  <nav id="sidebar">
    <div class="brand"><span class="lock">🔒</span><div><h1>Kenn's Vault</h1><div class="sub">Collection Manager</div></div></div>
    <div id="nav-content"></div>
    <div class="sidebar-footer">
      <div id="sync-badge">connecting…</div>
      <button class="btn btn-sm btn-block" onclick="exportData()">📤 Export Backup</button>
      <button class="btn btn-sm btn-block" onclick="document.getElementById('import-file').click()">📥 Import Backup</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <button class="btn btn-sm btn-block btn-red" onclick="resetToDefault()">🔄 Reset to Default</button>
    </div>
  </nav>
  <main id="main"></main>
</div>

<div id="mob-preview-backdrop"></div>
<div id="card-preview"><img id="card-preview-img" src="" alt=""></div>

<!-- Mobile bottom nav + floating deck button -->
<div id="bottom-nav"></div>
<button id="fab-decks" onclick="toggleSidebar(true)" title="Switch deck">🗂️</button>

<!-- Card detail modal -->
<div id="card-detail-backdrop" onclick="if(event.target===this)closeCardDetail()">
  <div class="cd-panel" id="cd-panel"></div>
</div>

// Ownership helpers — a card counts toward owned value by how many copies you have
function cOwnedQty(c){ if(typeof c.ownedQty==='number') return Math.min(c.ownedQty, c.qty||1); return c.owned?(c.qty||1):0; }
function cIsFullyOwned(c){ return cOwnedQty(c) >= (c.qty||1); }
function cIsPartial(c){ const o=cOwnedQty(c); return o>0 && o<(c.qty||1); }

const decksRef = db.ref('decks');
const sealedRef = db.ref('sealed');
const archiveRef = db.ref('archive');
let firebaseConnected=false, saving=false, dirty=false, saveTimer=null;
let _lastPriceFp='', _priceFpInit=false, _metaInit=false;
// Cheap fingerprint of all card prices — used to detect when the cron updated prices.
function priceFp(decks){
  let s=0,n=0;
  for(const d of (decks||[])){ const cs=Array.isArray(d.cards)?d.cards:Object.values(d.cards||{}); for(const c of cs){ if(c&&c.price){ s+=Math.round(c.price*100); n++; } } }
  return s+'|'+n;
}

function save() {
  // localStorage is always written immediately (reliable backstop)
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({decks:state.decks, sealed:state.sealed, archive:state.archive, valueHistory:state.valueHistory})); } catch(e){}
  if (!firebaseConnected) return;
  // Mark unsaved edits and debounce the cloud write so rapid taps coalesce
  // into one flush instead of being dropped (the old !saving guard skipped them).
  dirty = true;
  state.syncStatus='… Saving'; updateSync();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 350);
}
function flushSave() {
  if (!firebaseConnected) return;
  if (saving) { saveTimer = setTimeout(flushSave, 250); return; } // wait for in-flight write
  if (!dirty) return;
  saving = true;
  dirty = false; // clear up front — any edit during the write re-sets dirty=true
  Promise.all([decksRef.set(state.decks), sealedRef.set(state.sealed), archiveRef.set(state.archive), db.ref('valueHistory').set(state.valueHistory||[])]).then(()=>{
    saving=false; state.syncStatus='✓ Synced'; updateSync();
    if (dirty) flushSave(); // changes arrived during the write — flush again
  }).catch(err=>{ saving=false; dirty=true; state.syncStatus='⚠ Sync failed'; updateSync(); console.error(err); saveTimer=setTimeout(flushSave,1000); });
}
// Flush immediately if the app is backgrounded/closed mid-debounce
['pagehide','visibilitychange','beforeunload'].forEach(ev=>window.addEventListener(ev,()=>{ if(dirty){ clearTimeout(saveTimer); flushSave(); } }));
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.decks && d.decks.length) { state.decks=d.decks; state.sealed=d.sealed||[]; state.archive=d.archive||state.archive; state.valueHistory=d.valueHistory||[]; return true; }
  } catch(e){}
  return false;
}
function updateSync() {
  const el=document.getElementById('sync-badge');
  if(el){ el.textContent=state.syncStatus; el.style.color = state.syncStatus.includes('✓')?'var(--green)':state.syncStatus.includes('⚠')?'var(--orange)':'var(--text-dim)'; }
}
function initFirebase() {
  db.ref('.info/connected').on('value', s=>{
    firebaseConnected = s.val()===true;
    state.syncStatus = firebaseConnected ? '✓ Synced' : '⚡ Offline';
    updateSync();
  });
  // Auto-migrate: if remote data is older format (no version marker), push baked-in data up
  db.ref('dataVersion').once('value').then(snap=>{
    const v = snap.val()||0;
    const finish = ()=>{
      decksRef.on('value', s=>{
        let d=s.val();
        if (d && Array.isArray(d) && d.length>0 && !saving && !dirty) {
          // Sanitize: Firebase can drop empty arrays, turning cards into undefined
          d=d.filter(dk=>dk&&typeof dk==='object').map(dk=>{
            if(!Array.isArray(dk.cards)) dk.cards = dk.cards ? Object.values(dk.cards) : [];
            return dk;
          });
          // Detect a remote PRICE change (e.g. the cron updated prices) and stamp
          // the update time ourselves — so the dashboard reflects reality even if
          // the Worker build running the cron doesn't write the meta record.
          const fp=priceFp(d);
          if(_priceFpInit && fp!==_lastPriceFp){
            const recent = state.lastPriceUpdate && state.lastPriceUpdate.at && (Date.now()-new Date(state.lastPriceUpdate.at).getTime() < 90000);
            // Local provisional only — do NOT write to Firebase, or we'd overwrite the
            // Worker's own (more accurate, source-tagged) meta record on the same run.
            if(!recent){ state.lastPriceUpdate={at:new Date().toISOString(), ok:true, source:'auto'}; }
          }
          _lastPriceFp=fp; _priceFpInit=true;
          state.decks=d; try{localStorage.setItem(STORAGE_KEY,JSON.stringify({decks:state.decks,sealed:state.sealed,archive:state.archive}));}catch(e){}
          if(state.view.type==='deck' && state.view.deckIndex>=state.decks.length) state.view.deckIndex=0;
          state.syncStatus='✓ Synced'; render();
        }
      });
      sealedRef.on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && !saving && !dirty) { state.sealed=d; render(); }
      });
      archiveRef.on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && !saving && !dirty) { state.archive=d; render(); }
      });
      db.ref('valueHistory').on('value', s=>{
        const d=s.val();
        if (d && Array.isArray(d) && !saving && !dirty) { state.valueHistory=d; }
      });
      db.ref('meta/lastPriceUpdate').on('value', s=>{
        const d=s.val();
        if (d && typeof d==='object') {
          const isNew = !state.lastPriceUpdate || state.lastPriceUpdate.at!==d.at;
          state.lastPriceUpdate=d;
          if(_metaInit && isNew && d.at && (Date.now()-new Date(d.at).getTime() < 180000)){
            const manual = d.source==='manual'||d.source==='manual-trigger';
            showToast((d.ok===false?'⚠ Price update failed':'✓ Prices updated')+(manual?' · manual':''));
          }
          _metaInit=true;
          render(); updateSync();
        }
      });
    };
    if (v < DATA_VERSION) {
      Promise.all([decksRef.set(state.decks), sealedRef.set(state.sealed), archiveRef.set(state.archive), db.ref('dataVersion').set(DATA_VERSION)])
        .then(finish).catch(finish);
    } else finish();
  }).catch(()=>{});
}

// ═══════════ HELPERS ═══════════
const TYPE_COLORS = {
  Creature:{bg:'rgba(20,148,102,.12)',text:'#34d399'}, Instant:{bg:'rgba(60,130,246,.12)',text:'#7cc4ff'},
  Sorcery:{bg:'rgba(150,100,255,.12)',text:'#c4a5ff'}, Enchantment:{bg:'rgba(251,150,60,.12)',text:'#fbab60'},
  Artifact:{bg:'rgba(150,160,170,.12)',text:'#9aa5b0'}, Land:{bg:'rgba(200,160,80,.12)',text:'#d8b070'},
  'Land Creature':{bg:'rgba(20,148,102,.12)',text:'#7dd8b5'}, Planeswalker:{bg:'rgba(232,100,160,.12)',text:'#f095c0'},
};
function typeBadge(t){ const c=TYPE_COLORS[t]||TYPE_COLORS.Creature; return `<span class="type-badge" style="background:${c.bg};color:${c.text};border:1px solid ${c.text}33">${t}</span>`; }
function deckTotal(d){ return (d&&Array.isArray(d.cards)?d.cards:[]).reduce((s,c)=>s+(c.qty||1),0); }
function ownedTotal(d){ return (d&&Array.isArray(d.cards)?d.cards:[]).reduce((s,c)=>s+cOwnedQty(c),0); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function scryUrl(set,cn,size='normal',game='mtg'){
  if(!set||!cn) return null;
  if(game==='riftbound'){
    const sz = size==='small'?'small':(size==='large'?'large':'medium');
    return `https://images.scrydex.com/riftbound/${(''+set).toUpperCase()}-${encodeURIComponent((''+cn).trim())}/${sz}`;
  }
  return `https://api.scryfall.com/cards/${(''+set).toLowerCase()}/${encodeURIComponent((''+cn).trim())}?format=image&version=${size}`;
}
// Resolve a card/pull image: custom imgUrl wins, otherwise auto Scryfall/Scrydex
function cardImg(obj, size, game){
  if(obj && obj.imgUrl && (''+obj.imgUrl).trim()) return (''+obj.imgUrl).trim();
  return scryUrl(obj?obj.set:'', obj?obj.cn:'', size, game||(obj&&obj.game)||'mtg');
}
function fmt$(n){ n=n||0; const a=Math.abs(n); if(a>0 && a<1) return '$'+n.toFixed(2); return '$'+Math.round(n).toLocaleString(); }
function relTime(iso){
  if(!iso) return '';
  const t=new Date(iso).getTime(); if(isNaN(t)) return '';
  const s=Math.max(0,Math.floor((Date.now()-t)/1000));
  if(s<60) return 'just now';
  const m=Math.floor(s/60); if(m<60) return m+(m===1?' min':' mins')+' ago';
  const h=Math.floor(m/60); if(h<24) return h+(h===1?' hour':' hours')+' ago';
  const d=Math.floor(h/24); if(d<7) return d+(d===1?' day':' days')+' ago';
  return new Date(iso).toLocaleDateString();
}
let _toastT=null;
function showToast(msg){
  let t=document.getElementById('vault-toast');
  if(!t){ t=document.createElement('div'); t.id='vault-toast'; t.className='vault-toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>{ t.classList.remove('show'); }, 3200);
}
function lastUpdateLine(){
  const lu=state.lastPriceUpdate;
  if(!lu||!lu.at) return `<span style="opacity:.6">Prices: not updated yet</span>`;
  const src = (lu.source==='manual'||lu.source==='manual-trigger') ? 'manual' : 'auto';
  const ok = lu.ok!==false;
  return `<span title="${esc(new Date(lu.at).toLocaleString())}">Prices updated <b style="color:var(--text-bright)">${relTime(lu.at)}</b> · ${src}${ok?'':' · ⚠ failed'}</span>`;
}

// ═══════════ RENDER ═══════════
const main = document.getElementById('main');
const navContent = document.getElementById('nav-content');
const isMobile = ()=> window.innerWidth <= 760;

function renderNav() {
  let h='';
  h+=`<div class="nav-section">Overview</div>`;
  h+=`<div class="nav-item ${state.view.type==='dashboard'?'active':''}" onclick="goView('dashboard')"><span class="ico">📊</span>Dashboard</div>`;
  h+=`<div class="nav-item ${state.view.type==='movers'?'active':''}" onclick="goView('movers')"><span class="ico">📈</span>Top Movers</div>`;
  h+=`<div class="nav-item ${state.view.type==='wishlist'?'active':''}" onclick="goView('wishlist')"><span class="ico">🛒</span>Wishlist</div>`;
  h+=`<div class="nav-item ${state.view.type==='browse'?'active':''}" onclick="goView('browse')"><span class="ico">🔎</span>Browse Cards</div>`;
  const games=[...new Set(state.decks.map(d=>d.game||'mtg'))];
  for(const g of games){
    const info=GAMES[g]||{label:g,icon:'🎴'};
    h+=`<div class="nav-section">${info.icon} ${info.label}</div>`;
    state.decks.forEach((d,i)=>{
      if((d.game||'mtg')!==g) return;
      const active = state.view.type==='deck' && state.view.deckIndex===i;
      const t=deckTotal(d);
      h+=`<div class="nav-item ${active?'active':''}" onclick="goDeck(${i})"><span class="ico">▸</span>${esc(d.name)}<span class="cnt">${t}</span></div>`;
    });
  }
  h+=`<div class="nav-section">Vault</div>`;
  h+=`<div class="nav-item ${state.view.type==='trophy'?'active':''}" onclick="goView('trophy')"><span class="ico">🏆</span>Trophy Room</div>`;
  h+=`<div class="nav-item ${state.view.type==='archive'?'active':''}" onclick="goView('archive')"><span class="ico">📚</span>The Archive<span class="cnt">${(state.archive||[]).length}</span></div>`;
  h+=`<div class="nav-item ${state.view.type==='sealed'?'active':''}" onclick="goView('sealed')"><span class="ico">📦</span>Sealed Tracker</div>`;
  if(state.decks.some(d=>(d.game||'mtg')==='riftbound')){
    h+=`<div class="nav-item ${state.view.type==='completion'?'active':''}" onclick="goView('completion')"><span class="ico">🎯</span>Set Completion</div>`;
  }
  h+=`<div class="nav-section">Manage</div>`;
  h+=`<div class="nav-item small" onclick="showImportDeck()"><span class="ico">＋</span>Add Deck</div>`;
  navContent.innerHTML=h;
  renderBottomNav();
}

function renderBottomNav() {
  const bn=document.getElementById('bottom-nav'); if(!bn) return;
  const tabs=[
    {t:'dashboard', ico:'📊', lbl:'Home'},
    {t:'deck', ico:'🃏', lbl:'Decks'},
    {t:'movers', ico:'📈', lbl:'Movers'},
    {t:'sealed', ico:'📦', lbl:'Sealed'},
    {t:'trophy', ico:'🏆', lbl:'Trophy'},
  ];
  bn.innerHTML = tabs.map(tab=>{
    const active = state.view.type===tab.t || (tab.t==='deck'&&state.view.type==='deck');
    const onclick = tab.t==='deck' ? `goDeck(${state.view.deckIndex||0})` : `goView('${tab.t}')`;
    return `<button class="${active?'active':''}" onclick="${onclick}"><span class="bn-ico">${tab.ico}</span>${tab.lbl}</button>`;
  }).join('');
}

function render() {
  try {
  renderNav();
  const t=state.view.type;
  if(main) main.classList.toggle('browse-wide', t==='browse');
  if (t==='deck') renderDeck();
  else if (t==='trophy') renderTrophy();
  else if (t==='archive') renderArchive();
  else if (t==='sealed') renderSealed();
  else if (t==='dashboard') renderDashboard();
  else if (t==='movers') renderMovers();
  else if (t==='wishlist') renderWishlist();
  else if (t==='browse') renderBrowse();
  else if (t==='completion') renderCompletion();
  else renderDeck();
  renderModals();
  updateSync();
  } catch(e) {
    if(main) main.innerHTML='<div style="padding:30px;color:#f87171;font-family:monospace;white-space:pre-wrap;font-size:12px">RENDER ERROR:\n'+(e&&e.message)+'\n\n'+(e&&e.stack)+'</div>';
    console.error('render error',e);
  }
}

function topbar(title, extra='') {
  return `<div class="topbar"><div id="menu-toggle" onclick="toggleSidebar()">☰</div><h2>${title}</h2><div class="spacer"></div>${extra}</div>`;
}

// Riftbound section order
const RB_SECTION_ORDER = ['Legend','Champion','Main Deck','Battlefield','Rune Pool','Sideboard'];
const RB_SECTION_META = {
  'Legend':{icon:'👑',color:'var(--gold)'}, 'Champion':{icon:'⭐',color:'var(--purple)'},
  'Main Deck':{icon:'🃏',color:'var(--green)'}, 'Battlefield':{icon:'🗺️',color:'var(--blue)'},
  'Rune Pool':{icon:'🔮',color:'var(--orange)'}, 'Sideboard':{icon:'🔄',color:'var(--text-dim)'}
};

function rowHtml(deck, card, idx, mob, grid, rowIndex) {
  const oq = cOwnedQty(card), q = card.qty||1;
  const full = oq>=q, partial = oq>0 && oq<q;
  const rowClass = full?'owned':(partial?'partial':'');
  const bg = full?'var(--green-bg)':(partial?'rgba(232,196,104,0.06)':(rowIndex%2===0?'rgba(255,255,255,0.012)':'transparent'));
  const noPrev = !(card.set&&card.cn);
  const ownTag = q>1 ? `<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:${full?'rgba(52,211,153,.15)':'rgba(232,196,104,.15)'};color:${full?'var(--green)':'var(--gold)'};font-weight:600;vertical-align:middle">${oq}/${q}</span>` : '';
  const badges = (card.foil?` <span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(232,196,104,.13);color:var(--gold);font-weight:600;vertical-align:middle">✦F</span>`:'')
    + (card.gameChanger?` <span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(248,113,113,.13);color:var(--red);font-weight:600;vertical-align:middle">GC</span>`:'')
    + (['Commander','Legend','Champion'].includes(card.role)?` <span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(251,171,96,.13);color:var(--orange);font-weight:600;vertical-align:middle">${card.role==='Commander'?'CMD':card.role.slice(0,3).toUpperCase()}</span>`:'')
    + (ownTag?' '+ownTag:'')
    + (noPrev?`<span class="no-preview" title="No preview — set code missing"></span>`:'');
  // checkbox: full=check, partial=dash, none=empty. For multi-qty, tapping cycles; for single, toggles
  const cbInner = full?'':(partial?'<span style="color:#fff;font-size:13px;font-weight:700;line-height:1">–</span>':'');
  const cbClass = full?'cb checked':(partial?'cb partial':'cb');
  const nameColor = full?'var(--green)':(partial?'var(--gold)':'var(--text-bright)');
  const onCb = q>1?`cycleOwned(${idx},event)`:`toggleOwned(${idx})`;
  if (mob) {
    return `<div class="table-row ${rowClass}" style="grid-template-columns:${grid};background:${bg};min-height:46px">
      <div style="display:flex;align-items:center;justify-content:center;padding:4px 0" onclick="${onCb}"><div class="${cbClass}">${cbInner}</div></div>
      <div style="padding:7px 4px;min-width:0" onclick="mobilePreview(event,'${esc(card.set)}','${esc(card.cn)}','${deck.game||'mtg'}',${card.foil?1:0},'${esc(card.imgUrl||'')}')">
        <div style="font-size:12.5px;color:${nameColor};font-weight:${['Commander','Legend','Champion'].includes(card.role)?700:400};line-height:1.3;word-break:break-word">${esc(card.name)}${badges}</div>
        <div style="font-size:9.5px;color:var(--text-dim);margin-top:1px">${esc(card.role)} · ${esc(card.type)}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-dim)" class="mono">${q>1?`<span style="color:var(--orange);font-weight:600">×${q}</span>`:q}</div>
      <div style="display:flex;align-items:center;justify-content:flex-end;font-size:11px;padding:0 4px" class="price mono">$${card.price>0?card.price.toFixed(0):'—'}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:1px">${(deck.game||'mtg')==='riftbound'&&(card.role==='Main Deck'||card.role==='Sideboard')?'<button style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:15px;line-height:1;padding:5px 3px;opacity:.85" onclick="swapSideboard('+idx+')" title="'+(card.role==='Sideboard'?'Move to Main':'Move to Side')+'">🔄</button>':''}<button style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:15px;line-height:1;padding:5px 3px" onclick="openCardDetail('${esc(card.name).replace(/'/g,"\\'")}','${deck.game||'mtg'}',${card.foil?1:0})">📊</button><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;padding:5px 3px" onclick="editCard(${idx})">✏️</button></div>
    </div>`;
  }
  return `<div class="table-row ${rowClass}" style="grid-template-columns:${grid};background:${bg}">
    <div style="text-align:center;padding:7px 0" onclick="${onCb}"><div class="${cbClass}" style="margin:0 auto">${cbInner}</div></div>
    <div data-set="${esc(card.set)}" data-cn="${esc(card.cn)}" data-game="${deck.game||'mtg'}" data-foil="${card.foil?1:0}" data-img="${esc(card.imgUrl||'')}" style="padding:7px 8px;font-size:13px;color:${nameColor};font-weight:${['Commander','Legend','Champion'].includes(card.role)?700:400}" onclick="${onCb}">${esc(card.name)}${badges}</div>
    <div style="text-align:center;font-size:13px;color:var(--text-dim)" class="mono">${q>1?`<span style="color:var(--orange);font-weight:600">×${q}</span>`:q}</div>
    <div style="padding:7px 6px;font-size:11.5px;color:var(--text-dim)">${esc(card.role)}</div>
    <div style="padding:7px 6px">${typeBadge(card.type)}</div>
    <div style="padding:7px;text-align:right" class="price mono">$${card.price>0?card.price.toFixed(2):'—'}${card.change7d?`<span class="price-chg ${card.change7d>=0?'up':'down'}">${card.change7d>=0?'▲':'▼'}</span>`:''}</div>
    <div style="text-align:center;display:flex;gap:0;justify-content:center"><button style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:16px;padding:6px" onclick="openCardDetail('${esc(card.name).replace(/'/g,"\\'")}','${deck.game||'mtg'}',${card.foil?1:0})" title="Card details &amp; price history">📊</button>${(deck.game||'mtg')==='riftbound'&&(card.role==='Main Deck'||card.role==='Sideboard')?'<button style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:11px;padding:4px;opacity:.7" onclick="swapSideboard('+idx+')" title="'+(card.role==='Sideboard'?'Move to Main':'Move to Side')+'">🔄</button>':''}<button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:4px" onclick="editCard(${idx})" title="Edit">✏️</button><button style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:4px" onclick="removeCard(${idx})" title="Remove">🗑️</button></div>
  </div>`;
}

function buildTableBody(deck, cards, mob, grid) {
  let display=cards.map((c,i)=>({c,idx:i}));
  if(state.filterType!=='All') display=display.filter(o=>o.c.type===state.filterType);
  if(state.filterRole!=='All') display=display.filter(o=>o.c.role===state.filterRole);
  if(state.search){ const q=state.search.toLowerCase(); display=display.filter(o=>o.c.name.toLowerCase().includes(q)); }
  if(state.sort.field){
    display.sort((x,y)=>{ let va=x.c[state.sort.field],vb=y.c[state.sort.field];
      if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();}
      if(typeof va==='boolean'){va=va?1:0;vb=vb?1:0;}
      if(va<vb)return state.sort.dir==='asc'?-1:1; if(va>vb)return state.sort.dir==='asc'?1:-1; return 0; });
  }
  const isRift = (deck.game||'mtg')==='riftbound';
  let h='';
  // Section grouping for Riftbound (only when not actively sorting by a column — sorting flattens)
  if (isRift && !state.sort.field) {
    const groups={};
    for(const o of display){ const r=o.c.role||'Other'; (groups[r]=groups[r]||[]).push(o); }
    const order=[...RB_SECTION_ORDER.filter(s=>groups[s]), ...Object.keys(groups).filter(s=>!RB_SECTION_ORDER.includes(s))];
    let ri=0;
    for(const sec of order){
      const meta=RB_SECTION_META[sec]||{icon:'•',color:'var(--text-dim)'};
      const secCards=groups[sec];
      const secTotal=secCards.reduce((s,o)=>s+(o.c.qty||1),0);
      const secOwned=secCards.reduce((s,o)=>s+cOwnedQty(o.c),0);
      h+=`<div class="section-header" style="border-left:3px solid ${meta.color}"><span style="color:${meta.color}">${meta.icon} ${esc(sec)}</span><span class="mono" style="color:var(--text-dim);font-size:10px">${secOwned}/${secTotal}</span></div>`;
      for(const o of secCards){ h+=rowHtml(deck,o.c,o.idx,mob,grid,ri++); }
    }
  } else {
    let ri=0;
    for(const o of display){ h+=rowHtml(deck,o.c,o.idx,mob,grid,ri++); }
  }
  return {html:h, count:display.length};
}

function saveArchiveCard(){
  const c = {
    name: document.getElementById('ar-name').value.trim(),
    game: document.getElementById('ar-game').value,
    set: (document.getElementById('ar-set').value||'').trim().toLowerCase(),
    cn: (document.getElementById('ar-cn').value||'').trim(),
    qty: parseInt(document.getElementById('ar-qty').value)||1,
    market: parseFloat(document.getElementById('ar-market').value)||0,
    low: parseFloat(document.getElementById('ar-low').value)||0,
    notes: document.getElementById('ar-notes').value,
    foil: document.getElementById('ar-foil').checked,
    variant: (document.getElementById('ar-variant')||{}).value||'Normal',
    imgUrl: (document.getElementById('ar-imgurl').value||'').trim()
  };
  if(!c.name){alert('Enter a card name.');return;}
  const isNew = state.editingArchive==='new';
  const prev = isNew ? null : state.archive[state.editingArchive];
  const printingChanged = !prev || prev.set!==c.set || prev.cn!==c.cn || !!prev.foil!==!!c.foil || (prev.variant||'Normal')!==(c.variant||'Normal');
  if(isNew) state.archive.push(c);
  else state.archive[state.editingArchive]=c;
  state.editingArchive=null; save(); render();
  // Immediately fetch an exact market price when set/collector#/foil is set or changed
  if(printingChanged && c.set && c.cn){
    showToast('Updating price…');
    repriceCard(c, c.game||'mtg').then(res=>{
      if(res && res.price>0){ c.market=res.price; if(typeof res.change7dPct==='number')c.change7dPct=res.change7dPct; recordPhJs(c,res.price); save(); if(state.view.type==='archive')render(); showToast('✓ Updated to '+fmt$(res.price)); }
      else showToast('No price found for that printing');
    });
  }
}
// Exact single-card price via the API (Scryfall exact printing for MTG,
// Worker /price-exact for Riftbound). Returns {price, change7dPct?, ...} or null.
async function repriceCard(card, game){
  game=game||'mtg';
  const foil=!!card.foil;
  if(game==='mtg'){
    if(card.set && card.cn){
      try{ const r=await fetch('https://api.scryfall.com/cards/'+encodeURIComponent((''+card.set).toLowerCase())+'/'+encodeURIComponent(card.cn));
        if(r.ok){ const c=await r.json(); const pr=c.prices||{}; const p=foil?parseFloat(pr.usd_foil||pr.usd_etched||pr.usd||0):parseFloat(pr.usd||pr.usd_foil||0); if(p>0) return {price:p}; } }catch(e){}
    }
    try{ const nm=(card.name||'').split('//')[0].split(' / ')[0].trim(); const r=await fetch('https://api.scryfall.com/cards/named?exact='+encodeURIComponent(nm));
      if(r.ok){ const c=await r.json(); const pr=c.prices||{}; const p=parseFloat(pr.usd||pr.usd_foil||0); if(p>0) return {price:p}; } }catch(e){}
    return null;
  }
  // Riftbound
  if(PRICE_PROXY.includes('CHANGEME')) return null;
  if(card.set && card.cn){
    try{ const u=PRICE_PROXY+'/price-exact?game=riftbound&set='+encodeURIComponent((''+card.set).toLowerCase())+'&cn='+encodeURIComponent(card.cn)+'&foil='+(foil?'1':'0')+'&variant='+encodeURIComponent(card.variant||card.printing||'');
      const r=await fetch(u); if(r.ok){ const d=await r.json(); if(d.matched && d.price>0) return {price:d.price, change7dPct:d.change7dPct, change7d:d.change7d, low:d.low}; } }catch(e){}
    return null; // has an exact printing but no match — do NOT fall back to fuzzy name search (wrong prices)
  }
  // Only fuzzy-match by name when there is no set/collector # to be exact with
  try{ const nm=(card.name||'').replace(/\s*\([^)]*\)\s*$/,'').replace(/,\s*/g,' - ').replace(/['\u2019]/g,'');
    const r=await fetch(PRICE_PROXY+'/price?name='+encodeURIComponent(nm)+'&foil='+(foil?'1':'0')); if(r.ok){ const d=await r.json(); const p=parseFloat(d.price||0); if(p>0) return {price:p}; } }catch(e){}
  return null;
}

async function refreshArchivePrices(){
  let updated=0;
  // MTG cards via Scryfall
  const mtgCards = state.archive.filter(c=>(c.game||'mtg')==='mtg');
  if(mtgCards.length){
    const ids = mtgCards.map(c=> c.set&&c.cn ? {set:c.set,collector_number:''+c.cn} : {name:c.name.split('//')[0].split(' / ')[0].trim()});
    for(let i=0;i<ids.length;i+=75){
      try{
        const resp=await fetch('https://api.scryfall.com/cards/collection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifiers:ids.slice(i,i+75)})});
        if(resp.ok){
          const data=await resp.json();
          for(const card of (data.data||[])){
            let m=mtgCards.find(c=>c.set&&c.cn&&(''+c.set).toLowerCase()===(''+card.set).toLowerCase()&&(''+c.cn).toLowerCase()===(''+card.collector_number).toLowerCase());
            if(!m){ const fn=card.name.split('//')[0].trim().toLowerCase();
              m=mtgCards.find(c=>!(c.set&&c.cn)&&c.name.split('//')[0].split(' / ')[0].trim().toLowerCase()===fn); }
            if(!m)continue;
            const price = m.foil
              ? parseFloat(card.prices?.usd_foil || card.prices?.usd_etched || card.prices?.usd || '0')
              : parseFloat(card.prices?.usd || card.prices?.usd_foil || '0');
            if(price>0){ m.market=price; updated++; }
          }
        }
      }catch(e){console.error(e);}
      await new Promise(r=>setTimeout(r,130));
    }
  }
  // Riftbound cards via your Cloudflare Worker — exact set+collector# (handles signatures/foils)
  const rbCards = state.archive.filter(c=>c.game==='riftbound');
  if(rbCards.length && !PRICE_PROXY.includes('CHANGEME')){
    for(const c of rbCards){
      const res=await repriceCard(c,'riftbound');
      if(res && res.price>0){ c.market=res.price; if(typeof res.change7dPct==='number')c.change7dPct=res.change7dPct; if(typeof res.change7d==='number')c.change7d=res.change7d; recordPhJs(c,res.price); updated++; }
      await new Promise(r=>setTimeout(r,120));
    }
  }
  save(); render();
  alert('Updated '+updated+' archive prices.');
}

      h += `<div class="pulls">`;
      o.pulls.forEach(p=>{
        const pg = (o.game||'MTG').toLowerCase()==='riftbound'?'riftbound':'mtg';
        const url = cardImg(p,'small',pg);
        h += `<div class="pull">${url?`<img loading="lazy" src="${url}" onerror="this.style.display='none'">`:''}
          <div class="pn">${esc(p.name)}</div><div class="pv">${fmt$(parseFloat(p.value)||0)}</div></div>`;
      });
      h += `</div>`;
    }
    h += `</div>`;
  });
  main.innerHTML = h;
}

async function refreshSealedPrices(){
  let updated=0, skipped=0;
  for(const o of (state.sealed||[])){
    const pg=(o.game||'MTG').toLowerCase()==='riftbound'?'riftbound':'mtg';
    for(const p of (o.pulls||[])){
      if(!p.set || !p.cn){ skipped++; continue; } // need set + collector # for an exact price
      const res=await repriceCard(p, pg);
      if(res && res.price>0){ p.value=res.price; updated++; }
      await new Promise(r=>setTimeout(r,120));
    }
    o.value=(o.pulls||[]).reduce((a,x)=>a+(parseFloat(x.value)||0),0); // opening value = sum of pulls
  }
  save(); render();
  alert('Updated '+updated+' pull prices'+(skipped?` (${skipped} skipped — no set/collector #)`:'')+'.');
}

function toggleSidebar(force){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebar-overlay'), mn=document.getElementById('main');
  if(isMobile()){ const open = force!==undefined?force:!sb.classList.contains('open'); sb.classList.toggle('open',open); ov.classList.toggle('show',open); }
  else { const collapsed = force!==undefined?!force:!sb.classList.contains('collapsed'); sb.classList.toggle('collapsed',collapsed); mn.classList.toggle('full',collapsed); }

function toggleSort(f){ if(state.sort.field===f) state.sort.dir=state.sort.dir==='asc'?'desc':'asc'; else state.sort={field:f,dir:'asc'}; render(); }

  if (state.view.type==='deck'){
    const deck=state.decks[state.view.deckIndex]; const cards=deck.cards; const mob=isMobile();

function toggleOwned(idx){
  const c=state.decks[state.view.deckIndex].cards[idx];
  const q=c.qty||1;
  // single-copy: flip between 0 and full
  c.ownedQty = cIsFullyOwned(c) ? 0 : q;
  c.owned = c.ownedQty>=q;
  persistAndRefreshRows();
}
function cycleOwned(idx, e){
  if(e) e.stopPropagation();
  const c=state.decks[state.view.deckIndex].cards[idx];
  const q=c.qty||1;
  // cycle 0 → q (full) → then steps down? No: tap increments by 1, wraps at q→0. Long-press not needed.
  let oq=cOwnedQty(c);
  oq = oq>=q ? 0 : oq+1;
  c.ownedQty=oq; c.owned=oq>=q;
  persistAndRefreshRows();
}
function persistAndRefreshRows(){
  save();
  // Re-render just the table body + stats area, preserve scroll
  const sc=window.scrollY;
  render();
  requestAnimationFrame(()=>window.scrollTo(0,sc));
}
function editCard(idx){ state.editingCard=idx; render(); }
function closeEdit(){ state.editingCard=null; render(); }
function saveEdit(){
  const c=state.decks[state.view.deckIndex].cards[state.editingCard];
  const oldSet=c.set, oldCn=c.cn, oldFoil=!!c.foil, oldVar=c.variant||'Normal';
  c.name=document.getElementById('edit-name').value.trim()||c.name;
  c.role=document.getElementById('edit-role').value.trim()||c.role;
  c.type=document.getElementById('edit-type').value;
  c.qty=parseInt(document.getElementById('edit-qty').value)||1;
  let oq=parseInt(document.getElementById('edit-ownedqty').value); if(isNaN(oq))oq=0;
  c.ownedQty=Math.max(0,Math.min(oq,c.qty)); c.owned=c.ownedQty>=c.qty;
  c.price=parseFloat(document.getElementById('edit-price').value)||0;
  c.gameChanger=document.getElementById('edit-gc').checked;
  c.foil=document.getElementById('edit-foil').checked;
  c.notes=document.getElementById('edit-notes').value;
  c.set=(document.getElementById('edit-set').value||'').trim().toLowerCase();
  c.cn=(document.getElementById('edit-cn').value||'').trim();
  c.imgUrl=(document.getElementById('edit-imgurl').value||'').trim();
  const vEl=document.getElementById('edit-variant'); if(vEl) c.variant=vEl.value;
  const g=(state.decks[state.view.deckIndex].game)||'mtg';
  const printingChanged = (c.set!==oldSet)||(c.cn!==oldCn)||(!!c.foil!==oldFoil)||((c.variant||'Normal')!==oldVar);
  state.editingCard=null; save(); render();
  // Immediately re-price when the printing (set / collector # / foil) changed
  if(printingChanged && c.set && c.cn){
    showToast('Updating price…');
    repriceCard(c,g).then(res=>{
      if(res && res.price>0){
        c.price=res.price;
        if(typeof res.change7dPct==='number') c.change7dPct=res.change7dPct;
        if(typeof res.change7d==='number') c.change7d=res.change7d;
        recordPhJs(c,res.price);
        save(); if(state.view.type==='deck') render();
        showToast('✓ Updated to '+fmt$(res.price));
      } else { showToast('No price found for that printing'); }
    });
  }
}

function deleteDeck(){

  const d=state.decks[state.view.deckIndex];

function showImportDeck(){ state.showImportDeck=true; if(isMobile())toggleSidebar(false); render(); }
function parseDeckList(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('//')&&!l.startsWith('#'));
  const cards=[]; 
  for(const line of lines){
    const isFoil = /\*F\*/.test(line);
    let m=line.match(/^(\d+)\s+(.+?)\s+\(([A-Za-z0-9]+)\)\s+(\S+?)(?:\s+\*F\*)?$/);
    let qty,name,set='',cn='';
    if(m){ qty=parseInt(m[1]); name=m[2].trim(); set=m[3].toLowerCase(); cn=m[4]; }
    else { m=line.match(/^(\d+)\s+(.+)$/); if(!m)continue; qty=parseInt(m[1]); name=m[2].replace(/\s*\*F\*\s*$/,'').trim(); }
    const ex=cards.find(c=>c.name.toLowerCase()===name.toLowerCase());
    if(ex){ ex.qty+=qty; continue; }
    const nl=name.toLowerCase();
    const landish=['forest','island','swamp','mountain','plains'].includes(nl)||/(pathway|foundry|retreat|prairie|mesa|canyon|verge|garrison|tower|enclave|stronghold|saga|snarl|parlor|peaks|passage|flagstones|sanctum|coliseum|grove|catacombs|bluffs|cliffs|shores|springs|ruins|reef|ridge|river|bog|mine|quarry|portal|bridge|orchard|hub|settlement|encampment|ring$)/.test(nl);
    const type=landish?'Land':'Creature';
    const nc=makeCard(name,qty,landish?'Land':'Uncategorized',type,false,0,set,cn);
    nc.foil=isFoil;
    cards.push(nc);
  }
  return cards;
}
function importDeckList(){
  const name=document.getElementById('imp-name').value.trim();
  const game=document.getElementById('imp-game').value;
  const cmdr=document.getElementById('imp-cmdr').value.trim();
  const bracket=parseInt(document.getElementById('imp-bracket').value)||3;
  const owned=document.getElementById('imp-owned').value==='true';
  const txt=document.getElementById('imp-list').value;
  if(!name){alert('Enter a deck name.');return;}
  const cards=parseDeckList(txt);
  if(cards.length===0){alert('Could not parse any cards.');return;}
  if(owned)cards.forEach(c=>c.owned=true);
  if(cmdr){const cc=cards.find(c=>c.name.toLowerCase()===cmdr.toLowerCase()); if(cc)cc.role='Commander';}
  state.decks.push({id:'deck-'+Date.now(),name,commander:cmdr||'',colors:[],bracket,game,strategy:null,cards});
  state.view={type:'deck',deckIndex:state.decks.length-1}; state.showImportDeck=false;
  save(); render();
}

function saveOpening(){
  const pullsTxt=document.getElementById('op-pulls').value;
  const pulls=pullsTxt.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const parts=l.split('|').map(p=>p.trim());
    return {name:parts[0]||'',set:(parts[1]||'').toLowerCase(),cn:parts[2]||'',value:parseFloat(parts[3])||0,imgUrl:(parts[4]||'').trim()};
  });
  const o={ product:document.getElementById('op-product').value.trim(),
    date:document.getElementById('op-date').value, game:document.getElementById('op-game').value,
    cost:parseFloat(document.getElementById('op-cost').value)||0,
    value:parseFloat(document.getElementById('op-value').value)||0,
    notes:document.getElementById('op-notes').value, pulls };
  if(!o.product){alert('Enter a product name.');return;}
  if(state.editingOpening==='new') state.sealed.push(o);
  else state.sealed[state.editingOpening]=o;
  state.editingOpening=null; save(); render();

function exportData(){
  const blob=new Blob([JSON.stringify({version:2,decks:state.decks,sealed:state.sealed,archive:state.archive},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`kenns_vault_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}
function importData(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();

async function refreshPrices(silent){
  const deck=state.decks[state.view.deckIndex];
  const game=deck.game||'mtg';
  let updated=0;
  
  if(game==='mtg'){
    // MTG: use Scryfall (TCGPlayer market prices)
    const ids=[]; const basics=['forest','island','swamp','mountain','plains'];
    for(const c of deck.cards){
      if(basics.includes(c.name.toLowerCase()))continue;
      ids.push(c.set&&c.cn ? {set:c.set,collector_number:''+c.cn} : {name:c.name.split('//')[0].split(' / ')[0].trim()});
    }
    for(let i=0;i<ids.length;i+=75){
      try{
        const resp=await fetch('https://api.scryfall.com/cards/collection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifiers:ids.slice(i,i+75)})});
        if(resp.ok){
          const data=await resp.json();
          for(const card of (data.data||[])){
            let m=deck.cards.find(c=>c.set&&c.cn&&(''+c.set).toLowerCase()===(''+card.set).toLowerCase()&&(''+c.cn).toLowerCase()===(''+card.collector_number).toLowerCase());
            if(!m){ const fn=card.name.split('//')[0].trim().toLowerCase();
              m=deck.cards.find(c=>!(c.set&&c.cn)&&c.name.split('//')[0].split(' / ')[0].trim().toLowerCase()===fn); }
            if(!m)continue;
            const price = m.foil
              ? parseFloat(card.prices?.usd_foil || card.prices?.usd_etched || card.prices?.usd || '0')
              : parseFloat(card.prices?.usd || card.prices?.usd_foil || '0');
            if(price>0){ m.price=price; updated++; }
          }
        }
      }catch(e){console.error(e);}
      await new Promise(r=>setTimeout(r,130));
    }
    (deck.cards||[]).forEach(c=>recordPhJs(c,c.price||0));
    if(!silent){ stampPriceUpdate(); save(); render(); alert('Updated '+updated+' prices from Scryfall (exact printings).'); }
    else { save(); }
    return;
  } else if(game==='riftbound'){
    // Riftbound: tcgapi.dev via your Cloudflare Worker (hides key, adds CORS)
    if(PRICE_PROXY.includes('CHANGEME')){ if(!silent)alert('Price proxy not set up yet.'); return; }
    // Fetch ALL Riftbound set prices in one combined call (includes promos, all sets)
    let priceMap=null, bulkWorked=false;
    try{
      const resp=await fetch(PRICE_PROXY+'/price-all');
      if(resp.ok){
        const data=await resp.json();
        if(data.prices && !data.fallback && Object.keys(data.prices).length){ priceMap=data.prices; bulkWorked=true; }
      }
    }catch(e){}
    if(bulkWorked){
      const strip=s=>(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
      for(const c of deck.cards){
        const sc=(c.set||'').toLowerCase();
        const cn=c.cn?(''+c.cn).replace(/^0+(\d)/,'$1'):'';
        let entry=null;
        // 1) Exact printing: set-cn composite key (e.g. "unl-234")
        if(sc&&cn){ entry = (c.foil&&priceMap[sc+'-'+cn+'_foil']) || priceMap[sc+'-'+cn]; }
        // 2) Generic cn (cheapest base printing)
        if((!entry||!(entry.price>0))&&cn){ entry = (c.foil&&priceMap[cn+'_foil']) || priceMap[cn]; }
        // 3) Name fallback
        if(!entry||!(entry.price>0)){
          const nk='n:'+strip(c.name.replace(/\s*\(SB\)\s*$/,''));
          entry = (c.foil&&priceMap[nk+'_foil']) || priceMap[nk];
        }
        if(entry&&entry.price>0){ c.price=entry.price; if(entry.change7d!==undefined)c.change7d=entry.change7d; if(entry.change7dPct!==undefined)c.change7dPct=entry.change7dPct; updated++; }
      }
      (deck.cards||[]).forEach(c=>recordPhJs(c,c.price||0));
      if(!silent){ stampPriceUpdate(); save(); render(); alert('Updated '+updated+' Riftbound prices (all sets bulk).'); }
      else save();
    } else {
      // Fallback: individual card lookups via /price (parallel batches for speed)
      function rbName(n){ return n.replace(/\s*\(SB\)\s*$/,'').trim().replace(/,\s*/g,' - ').replace(/['\u2019]/g,''); }
      const seen=new Set(); const uniq=[];
      for(const c of deck.cards){ const k=c.name.replace(/\s*\(SB\)\s*$/,'').trim().toLowerCase(); if(seen.has(k))continue; seen.add(k); uniq.push(c); }
      for(let i=0;i<uniq.length;i+=5){
        const batch=uniq.slice(i,i+5);
        await Promise.all(batch.map(async c=>{
          const key=c.name.replace(/\s*\(SB\)\s*$/,'').trim();
          try{
            const u=PRICE_PROXY+'/price?name='+encodeURIComponent(rbName(key))+'&foil='+(c.foil?'1':'0');
            const resp=await fetch(u);
            if(resp.ok){ const data=await resp.json(); const p=parseFloat(data.price||0);
              if(p>0){ deck.cards.filter(c2=>c2.name.replace(/\s*\(SB\)\s*$/,'').trim().toLowerCase()===key.toLowerCase()).forEach(c2=>{c2.price=p; if(data.change7d!==undefined)c2.change7d=data.change7d;}); updated++; }
            }
          }catch(e){}
        }));
      }
      (deck.cards||[]).forEach(c=>recordPhJs(c,c.price||0));
      if(!silent){ save(); render(); alert('Updated '+updated+' Riftbound prices (individual lookups — bulk unavailable).'); }
      else save();
    }
  } else {
    if(!silent) alert('Price refresh not available for this game.');
  }
}

// Auto-fill set codes and collector numbers for Riftbound cards.
// Strategy: RiftScribe via CORS proxy (free, has collector numbers). Falls back to tcgapi.dev 2-step.
async function autoFillIds(){
  const deck=state.decks[state.view.deckIndex];
  if((deck.game||'mtg')!=='riftbound'){alert('Auto-fill is for Riftbound decks only.');return;}
  const needFill=deck.cards.filter(c=>!(c.set&&c.cn));
  if(needFill.length===0){alert('All cards already have set/collector IDs!');return;}
  const seen=new Set(); let filled=0, failed=[], neterr=false;

  function parseId(id){
    if(!id) return null;
    const m=(''+id).match(/^([A-Za-z]+)-0*([0-9]+[a-z]?)/i);
    if(!m) return null;
    return {set:m[1].toLowerCase(), cn:m[2]};
  }
  function applyId(key, set, cn){
    deck.cards.filter(c2=>c2.name.replace(/\s*\(SB\)\s*$/,'').trim().toLowerCase()===key.toLowerCase()).forEach(c2=>{
      if(!c2.set) c2.set=set;
      if(!c2.cn) c2.cn=cn;
    });
  }
  // Try RiftScribe through a CORS proxy (r.jina.ai passes through JSON and adds CORS headers)
  async function viaRiftScribe(key){
    const target='https://riftscribe.gg/api/cards/search?q='+encodeURIComponent(key)+'&limit=20';
    const proxies=[
      'https://corsproxy.io/?url='+encodeURIComponent(target),
      'https://api.allorigins.win/raw?url='+encodeURIComponent(target)
    ];
    for(const url of proxies){
      try{
        const resp=await fetch(url);
        if(!resp.ok) continue;
        const data=await resp.json();
        const results=Array.isArray(data)?data:(data.data||data.cards||data.results||[]);
        if(!results||!results.length) continue;
        let match=results.find(r=>(r.name||'').toLowerCase()===key.toLowerCase())||results[0];
        const parsed=parseId(match.id||match.card_id||match.collector_id);
        if(parsed) return parsed;
      }catch(e){ /* try next proxy */ }
    }
    return null;
  }

  for(const c of needFill){
    const key=c.name.replace(/\s*\(SB\)\s*$/,'').trim();
    if(seen.has(key.toLowerCase()))continue;
    seen.add(key.toLowerCase());
    let parsed=null;
    try{ parsed=await viaRiftScribe(key); }
    catch(e){ neterr=true; }
    if(parsed){ applyId(key, parsed.set, parsed.cn); filled++; }
    else failed.push(key);
    await new Promise(r=>setTimeout(r,250));
  }
  save(); render();
  let msg='Filled IDs for '+filled+' cards.';
  if(failed.length) msg+='\n\nCouldn\'t find '+failed.length+': '+failed.slice(0,12).join(', ')+(failed.length>12?'…':'')+'\n\nIf ALL failed, the lookup service may be blocked — fill a couple manually via ✏️ and let me know.';
  alert(msg);
}

// Collapse entries that are the exact same printing (same game/set/cn/name/foil)
// across different decks into a single row. Sums `sumField` (e.g. qty/need) and
// labels how many decks it spans.
function modelKey(c){ return [c.game||'mtg',(c.set||'').toLowerCase(),normCnJs(c.cn),(c.name||'').toLowerCase().replace(/\s*\(sb\)\s*$/,''),c.foil?1:0].join('|'); }
function dedupModels(list, sumField){
  const map=new Map();
  for(const c of list){
    const k=modelKey(c);
    if(!map.has(k)){ map.set(k, {...c, _decks:new Set([c.deck])}); }
    else { const e=map.get(k); if(sumField) e[sumField]=(e[sumField]||0)+(c[sumField]||0); e._decks.add(c.deck); }
  }
  return [...map.values()].map(e=>{ const n=e._decks.size; if(n>1) e.deck=n+' decks'; delete e._decks; return e; });
}

// ═══════════ OVERHAUL: SPARKLINE (inline SVG) ═══════════
function sparkline(points, opts={}){
  // points: array of {date,value} or array of numbers
  const vals = points.map(p=>typeof p==='number'?p:(p.value||p.price)).filter(v=>typeof v==='number'&&!isNaN(v));
  if(vals.length<2) return `<div class="sparkline-empty">Not enough data yet — prices need a few refreshes to build history.</div>`;
  const w=opts.w||600, h=opts.h||90, pad=6;
  const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
  const stepX=(w-pad*2)/(vals.length-1);
  const pts=vals.map((v,i)=>{ const x=pad+i*stepX; const y=h-pad-((v-min)/range)*(h-pad*2); return [x,y]; });
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${pts[pts.length-1][0].toFixed(1)} ${h-pad} L ${pts[0][0].toFixed(1)} ${h-pad} Z`;
  const up = vals[vals.length-1] >= vals[0];
  const col = up ? 'var(--green)' : 'var(--red)';
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="spark-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.28"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#spark-g)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ═══════════ v28: RICH INTERACTIVE PRICE CHART ═══════════
// Returns an HTML string (SVG + tooltip div). Call wirePriceChart(id) after

let _rcSeq = 0;
const _rcStore = {};
function fmtMoney(n){ const a=Math.abs(n); const dec = a>=100?0:2; return '$'+n.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function shortDate(s){ const m=(''+s).match(/(\d{4})-(\d{2})-(\d{2})/); if(!m) return s||''; return parseInt(m[3])+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m[2])-1]; }
// Convert raw /history rows to chart points: keep only the matching finish
// (Foil vs Normal) when the series mixes them, and dedupe to one point per date.
function histRowsToPoints(pts, printing){
  if(!Array.isArray(pts)) return [];
  const wantFoil = printing==='Foil';
  let rows = pts;
  if(pts.some(x=>x&&x.printing)){
    const f = pts.filter(x=>(String(x.printing||'').toLowerCase()==='foil')===wantFoil);
    if(f.length) rows = f;
  }
  const byDate={};
  for(const pt of rows){ const d=pt.date||pt.timestamp||pt.day; const pr=parseFloat(pt.market_price??pt.price??pt.value); if(d&&!isNaN(pr)&&pr>0) byDate[d]=pr; }
  return Object.keys(byDate).sort().map(d=>({date:d, price:byDate[d]}));
}
function priceChart(points){
  const pts = (points||[]).map(p=>({date:p.date||p.timestamp||p.day, price:(typeof p==='number'?p:(p.price!=null?p.price:p.value))}))
    .filter(p=>typeof p.price==='number'&&!isNaN(p.price));
  if(pts.length<2) return `<div class="sparkline-empty">No price history available for this printing yet — it builds as prices refresh.</div>`;
  const id = 'rc'+(++_rcSeq);
  _rcStore[id] = pts;
  const W=620, H=190, padL=46, padR=14, padT=14, padB=26;
  const iw=W-padL-padR, ih=H-padT-padB;
  const vals=pts.map(p=>p.price);
  let min=Math.min(...vals), max=Math.max(...vals);
  if(min===max){ min=min*0.95; max=max*1.05||1; }
  const pad=(max-min)*0.12; min-=pad; max+=pad;
  const range=(max-min)||1;
  const X=i=>padL+(pts.length<2?0:i/(pts.length-1)*iw);
  const Y=v=>padT+ih-((v-min)/range)*ih;
  const up = vals[vals.length-1] >= vals[0];
  const col = up?'var(--green)':'var(--red)';
  const line = pts.map((p,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.price).toFixed(1)).join(' ');
  const area = line+` L ${X(pts.length-1).toFixed(1)} ${(padT+ih).toFixed(1)} L ${X(0).toFixed(1)} ${(padT+ih).toFixed(1)} Z`;
  // Y grid + labels (4 lines)
  let grid='', ylab='';
  for(let g=0; g<=3; g++){ const v=min+range*g/3; const y=Y(v); grid+=`<line class="rc-grid" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/>`; ylab+=`<text class="rc-axis" x="${padL-7}" y="${(y+3).toFixed(1)}" text-anchor="end">${fmtMoney(v)}</text>`; }

  // markers: first,last,min,max

  let dots=markers.map(i=>`<circle class="rc-dot" cx="${X(i).toFixed(1)}" cy="${Y(pts[i].price).toFixed(1)}" r="3.5" fill="${col}"/>`).join('');
  const lastX=X(pts.length-1), lastY=Y(pts[pts.length-1].price);
  return `<div class="rc-wrap" id="${id}">

      <defs><linearGradient id="${id}-g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.26"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
      ${grid}${ylab}${xlab}
      <path d="${area}" fill="url(#${id}-g)"/>

      ${dots}
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="5" fill="${col}" opacity="0.18"/>
      <line class="rc-cursor-line" x1="0" y1="${padT}" x2="0" y2="${padT+ih}"/>
      <circle class="rc-cursor-dot" r="4.5" fill="${col}"/>
      <rect x="${padL}" y="${padT}" width="${iw}" height="${ih}" fill="transparent" class="rc-hit"/>
    </svg>
    <div class="rc-tip"><div class="d"></div><div class="p"></div></div>

function wirePriceChart(id){
  const wrap=document.getElementById(id); if(!wrap) return;
  const pts=_rcStore[id]; if(!pts) return;
  const svg=wrap.querySelector('svg'), tip=wrap.querySelector('.rc-tip');
  const cLine=wrap.querySelector('.rc-cursor-line'), cDot=wrap.querySelector('.rc-cursor-dot');
  const padL=+svg.dataset.padl, padR=+svg.dataset.padr, padT=+svg.dataset.padt, padB=+svg.dataset.padb, W=+svg.dataset.w, H=+svg.dataset.h;
  const iw=W-padL-padR, ih=H-padT-padB;
  const vals=pts.map(p=>p.price); let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mn===mx){mn=mn*0.95;mx=mx*1.05||1;} const pd=(mx-mn)*0.12; mn-=pd; mx+=pd; const rng=(mx-mn)||1;
  function move(clientX){
    const r=svg.getBoundingClientRect();
    const sx=(clientX-r.left)/r.width*W; // to viewBox space
    let frac=(sx-padL)/iw; frac=Math.max(0,Math.min(1,frac));
    const i=Math.round(frac*(pts.length-1));
    const x=padL+(pts.length<2?0:i/(pts.length-1)*iw);
    const y=padT+ih-((pts[i].price-mn)/rng)*ih;
    cLine.setAttribute('x1',x); cLine.setAttribute('x2',x); cLine.style.opacity=1;
    cDot.setAttribute('cx',x); cDot.setAttribute('cy',y); cDot.style.opacity=1;
    tip.querySelector('.d').textContent=shortDate(pts[i].date);
    tip.querySelector('.p').textContent=fmtMoney(pts[i].price);
    tip.style.left=(x/W*r.width)+'px'; tip.style.top=(y/H*r.height)+'px'; tip.style.opacity=1;
  }
  function end(){ cLine.style.opacity=0; cDot.style.opacity=0; tip.style.opacity=0; }
  svg.addEventListener('mousemove',e=>move(e.clientX));
  svg.addEventListener('mouseleave',end);
  svg.addEventListener('touchstart',e=>{ if(e.touches[0]) move(e.touches[0].clientX); },{passive:true});
  svg.addEventListener('touchmove',e=>{ if(e.touches[0]){ move(e.touches[0].clientX); } },{passive:true});
  svg.addEventListener('touchend',end);
}

// Per-card daily price snapshot (mirrors the Worker) — powers 1d/3d/7d movers
function recordPhJs(c, price){
  if(!c || !(price>0)) return;
  const today=new Date().toISOString().slice(0,10);
  if(!Array.isArray(c.ph)) c.ph = c.ph ? Object.values(c.ph) : [];
  const last=c.ph[c.ph.length-1];
  if(last && last.d===today) last.p=price; else c.ph.push({d:today,p:price});
  if(c.ph.length>10) c.ph=c.ph.slice(-10);
}
function daysAgoStr(n){ return new Date(Date.now()-n*86400000).toISOString().slice(0,10); }
// % change over a window (1/3/7 days). Prefers the Worker's history-derived
// change1d/3d/7dPct (real data, no warm-up); falls back to local daily snapshots.
function cardChangePct(c, win){
  const field = win===1?'change1dPct':win===3?'change3dPct':'change7dPct';
  if(typeof c[field]==='number') return c[field];
  const ph=Array.isArray(c.ph)?c.ph:null, cur=c.price||0;
  if(ph && ph.length>=2 && cur>0){
    const target=daysAgoStr(win);
    let old=null;
    for(let i=ph.length-1;i>=0;i--){ if(ph[i].d<=target){ old=ph[i]; break; } }
    if(old && old.p>0){
      const ageDays=(Date.now()-Date.parse(old.d+'T00:00:00Z'))/86400000;
      const need = win===7?5:(win-0.5);
      if(ageDays>=need) return Math.round((cur-old.p)/old.p*1000)/10;
    }
  }
  if(win===7 && typeof c.change7dPct==='number') return c.change7dPct;
  return null;
}
function setMoversWin(w){ state.moversWindow=w; render(); }

function renderMovers(){

  let h=topbar('Top Movers', `<button class="btn btn-sm" onclick="refreshAllPrices()">💰 Refresh</button>`);

    <button class="${scope==='market'?'on':''}" onclick="setMoversScope('market')">⚔️ All Riftbound</button>
  </div>`;
  if(scope==='market'){ renderMarketMovers(h); return; }

  owned.forEach(c=>{ c._chg=cardChangePct(c,win); });

  const gainers=[...movers].filter(c=>c._chg>0).sort((a,b)=>b._chg-a._chg).slice(0,15);
  const losers=[...movers].filter(c=>c._chg<0).sort((a,b)=>a._chg-b._chg).slice(0,15);
  h+=`<div class="mv-tabs" style="padding-top:2px">

    main.innerHTML=h; return;

  main.innerHTML=h;
}

async function browseSelectCard(si){
  const b=browseInit(); const seed=_brSeeds[si]; if(!seed) return;
  b.selSi=si; b.selDetail=null; b.selLoading=true; b.selPrint=0; b.selHistByIdx={};

  paintAside();

  b.selDetail=d; b.selLoading=false;

    let idx=d.printings.findIndex(p=>normCnJs(p.number)===normCnJs(seed.cn)&&(p.setCode||'').toLowerCase()===(seed.set||'').toLowerCase());

    if(Array.isArray(d.history) && d.history.length){

// Shared: fetch full printings/detail for a card (worker → MTG Scryfall → seed synth)
async function fetchCardDetail(name, game, seed){
  let detail=null;
  if(!PRICE_PROXY.includes('CHANGEME')){
    const q = (game==='riftbound') ? name.replace(/,\s*/g,' - ').replace(/['\u2019]/g,'') : name;
    try{
      let resp=await fetch(PRICE_PROXY+'/detail-full?name='+encodeURIComponent(q)+'&game='+(game||'mtg'));
      if(resp.ok) detail=await resp.json();
      if(!detail || !detail.matched){
        const r2=await fetch(PRICE_PROXY+'/detail?name='+encodeURIComponent(q)+'&game='+(game||'mtg'));
        if(r2.ok){ const d2=await r2.json(); if(d2&&d2.matched) detail=d2; }
      }
    }catch(e){}
  }
  if((!detail || !detail.matched) && (game==='mtg')){
    try{
      const r=await fetch('https://api.scryfall.com/cards/search?q='+encodeURIComponent('!"'+name+'"')+'&unique=prints');
      if(r.ok){ const d=await r.json(); const prints=((d&&d.data)||[]).map(c=>{ const t=scryToCard(c); return { id:t.id, name:t.name, fullName:t.name, set:t.set, setCode:t.setCode, number:t.number, rarity:t.rarity, printing:t.printing, price:t.price, low:0, change7d:0, change7dPct:0, image:t.image }; }).filter(p=>p.price>0||p.image);
        if(prints.length) detail={ matched:true, name, printings:prints, history:[] };
      }
    }catch(e){}
  }
  if((!detail || !detail.matched) && seed && (seed.image||seed.price)){
    detail={ matched:true, name, printings:[{ id:'', name, fullName:name, set:seed.set||'', setCode:seed.set||'', number:seed.cn||'', rarity:'', printing:seed.printing||'Normal', price:seed.price||0, low:0, change7d:0, change7dPct:0, image:seed.image||'' }], history:[] };
  }
  return detail;
}

async function openCardDetail(name, game, foil, seed){
